 - A DCB I/O is stuck in active state."}, "1053": {"detail": "[Control System] Causes: • An invalid adjustment F16 for fire service type. • An invalid adjustment F15 for the secondary fire service switch type. • The I/O provided does not match requirements. (TAC32 Manual p205)", "title": "The Fire Service Phase 1 secondary switch I/O does not match the adjustment."}, "1054": {"detail": "[Control System] Causes: • A defective I/O. • A defective valve adjustment. • A defective valve. (TAC32 Manual p205)", "title": "Down run time has exceeded 5 minutes - The down run request was longer than the time allowed for a full hoistway run in the down direction."}, "1055": {"detail": "[Control System] Causes: — (TAC32 Manual p205)", "title": "The selector car position does not match with the BP sensors at the floor level - The BP magnets exist, and are valid, but do not agree with the position reported by the selector."}, "1056": {"detail": "[Control System] Causes: • A defective or missing hoistway scan. • A defective CPU. • A defective CPU battery. • Loose battery connections. • An improper power unit setup. • Improper selector signals. (TAC32 Manual p205)", "title": "Floor tables of the encoder counts are not set up when attempting an auto run. When the elevator is not on inspection operation, and the level reference in non-volatile memory for any floor is invalid."}, "1057": {"detail": "[Control System] Causes: A defective encoder. (TAC32 Manual p205)", "title": "The encoder is out of tolerance at the floor level - The car is at floor level, and the encoder position count is different than the floor position count by more than the value in adjustment P20."}, "1058": {"detail": "[Control System] Causes: — (TAC32 Manual p205)", "title": "Selector position wrong at limit of travel. The car is at the bottom or top of its travel limit and selector has determined the closest floor is not the corresponding bottom or top floor. See also: Selector I/O Troubleshooting."}, "1059": {"detail": "[Control System] Causes: A defective encoder. (TAC32 Manual p205)", "title": "Bad encoder re-calibration - Two consecutive encoder re-calibrations were out of range. The encoder reported a count (while at two consecutive floors) that was different from each floor position count by more than adjustment P20."}, "1060": {"detail": "[Control System] Causes: Run hoistway setup again, determine the failure/ fault preventing the complete setup. Magnet location matters. (TAC32 Manual p205)", "title": "The selector setup not completed - The selector setup either failed or was terminated before completion."}, "1061": {"detail": "[Control System] Causes: A defective selector. (TAC32 Manual p205)", "title": "Selector setup position count table error - The setup has determined that a value for a floor was invalid, and the setup is invalidated."}, "1062": {"detail": "[Control System] Causes: Possible Causes: • Improper normal terminal slowdown magnet placement. • A defective encoder. • Defective encoder wiring. Possible Solutions: • Check slowdown magnets for gaps. • Verify the P17 and/or P18 adjustments. • The terminal slowdown (NTST input for top, NTSB input for bottom) is reached too early (before the corresponding selector slowdown is reached). See P17 for top, and P18 for bottom. • If the NTSB input deactivates (metered logic) at the top terminal, or if the NTST input deactivates (metered logic) at the bottom terminal, •A 1086 error is generated, •A 1062 error is generated, •The car will run at slow speed to next stop. (TAC32 Manual p206)", "title": "Encoder interrupt failure - A car passed a slowdown point without receiving confirmation from the encoder."}, "1065": {"detail": "[Control System] Causes: See DHNF, DHNR. (TAC32 Manual p206)", "title": "HN board SPI loop error."}, "1067": {"detail": "[Control System] Causes: • One or both sensors is out of adjustment. • One or both sensors is defective. • Input wiring error. • A defective IOD or CPU Card. (TAC32 Manual p206)", "title": "Viscosity operation has detected activation of both low temperature and high temperature sensors at the same time."}, "1068": {"detail": "[Control System] Causes: Investigate jacks for out of sync status, and also the sensor activation points (min. 12 inches below the slowdown magnets.) See WJR. (TAC32 Manual p206)", "title": "Dual post jack resync fault racking error."}, "1069": {"detail": "[Control System] Causes: • Electrical noise affecting the power fail detection signal and/or the power supply (check grounding and noise suppression). • Power supply adjustment. • Defective power supply. • A defective CPU Card. (TAC32 Manual p206)", "title": "False power failure error - The CPU received a false NMI, non-maskable interrupt, indicating an impending power failure, and the power did not fail."}, "1070": {"detail": "[Control System] Causes: Defective selector sensors. (TAC32 Manual p206)", "title": "LVU-LVD error - Neither of the LVU or the LVD leveling sensors were active while the car was within the door zone. Minimum requirements: • One sensor active within the door zone. • Both sensors active at the floor level."}, "1071": {"detail": "[Control System] Causes: — (TAC32 Manual p206)", "title": "BLOM/BLO failed relay test. Note: BLOM input is only provided when a means (BLO relay) to bypass a final limit is required for jack resync operation."}, "1073": {"detail": "[Control System] Causes: • A defective door open limit. • Improper wiring. • Defective communication between the CPU Card and the electronic door operator. • Defective CPU Card &/or electric door operator. (TAC32 Manual p206)", "title": "Car/Gate door open limit error - A fault has been detected due to the activation of the door reversal limit and the door open limit."}, "1074": {"detail": "[Control System] Causes: • Pressure transducer indicated less than 45 PSI, or PRSW input deactivated.. (TAC32 Manual p207)", "title": "Input PRSW Active (Pressure Switch)."}, "1075": {"detail": "[Control System] Causes: — (TAC32 Manual p207)", "title": "Car stop switch override error - The car stop switch override circuit (controlled by CSTO output) has been detected faulty by its monitoring CSTOM input, and the elevator shuts down."}, "1076": {"detail": "[Control System] Causes: — (TAC32 Manual p207)", "title": "Freight door interlock stuck error - The freight door interlock (FDI) has failed to close at the start of a run, or failed to open at the end of a run."}, "1077": {"detail": "[Control System] Causes: A defective selector. (TAC32 Manual p207)", "title": "Loss of encoder pulse train error - While the car was in motion, the encoder motion signal pulse train (furnished by either a tape or rotary encoder) was lost, and the elevator is shut down at a floor."}, "1078": {"detail": "[Control System] Low battery error - The 3-volt battery in the CPU Card is either low or dead: • This battery is required to ensure retention of job configuration and adjustments. • If the job configuration and adjustments are lost, then the job configuration must be uploaded again. • Elevator adjustments may have to be repeated, including scanning the hoistway to learn the floor positions. Causes: • A dead battery. • The battery is missing, or installed backwards. • A defective CPU Card. (TAC32 Manual p207)", "title": "Low battery error - The 3-volt battery in the CPU Card is either low or dead: • This battery is required to ensure retention of job configuration and adjustments. • If the job configuration and adjustments are lost, then the job configuration must..."}, "1079": {"detail": "[Control System] Causes: • A defective position system (encoder/selector). • A car is bound and not able to move. • The position system adjustment does not match the provided hardware. (TAC32 Manual p207)", "title": "Down run attempted but velocity stayed zero - The position system specified determines the car velocity, and a down run is attempted. If the velocity returned by the position system remains zero, assume that the car has stalled."}, "1080": {"detail": "[Control System] Causes: • An invalid configuration or adjustment. • Corrupted memory: Install previously downloaded backup software. • A bad CPU Card. • This error can also be generated by the following information in the group memory: • The number of floors = 0, or is greater than the maximum number of floors permitted. • The number of cars in the group = 0, or is greater than the maximum number of cars permitted. • The number of I/O = 0, or is greater than the maximum number of I/O permitted. • Rear operation is specified, but there are no rear openings specified. (TAC32 Manual p207)", "title": "Bad group job data - The group software cannot run. Stored non-volatile data has invalid parameters in the group portion."}, "1081": {"detail": "[Control System] Bad initialization of non-volatile memory - This fault can occur if a new section of non-volatile memory is allocated by software, but the memory was not available at that time. Note: This fault can also occur when updating software or performing an INIT or INIT ALL. The Remote FAST (if open) will display which section of non-volatile memory failed. Causes: • Memory is temporarily unavailable - Reset the CPU. • A software error. • Corrupted memory - Load generic and job image (job's software). • A bad CPU Card. (TAC32 Manual p208)", "title": "Bad initialization of non-volatile memory - This fault can occur if a new section of non-volatile memory is allocated by software, but the memory was not available at that time. Note: This fault can also occur when updating software or performing an..."}, "1082": {"detail": "[Control System] Causes: • Memory is temporarily unavailable - Reset the CPU. • A software error. • Corrupted memory - Load generic and job image (job's software). • A bad CPU Card. (TAC32 Manual p208)", "title": "Bad save to non-volatile memory - This fault can occur if a save to non-volatile memory is attempted by software but the memory was not available at that time. Note: The Remote FAST (if open) will display which section of non-volatile memory failed."}, "1083": {"detail": "[Control System] Bad recall of non-volatile memory - This fault can occur if: • A recall from non-volatile memory is attempted by software, but the memory was not available at that time, or • If a memory segment is set to an invalid size, or • If a variable is set out of its valid range. The Remote FAST (if open) will display which section of nonvolatile memory failed. Causes: • Memory was temporarily unavailable - Reset the CPU. • A job image error - Check for incorrect TAG sizes through the WRT Remote FAST Command. • A job image error - Check for variables set incorrectly through the GET Remote FAST Command. • Corrupted memory - Load generic and job image (job's software) • A bad CPU Card. (TAC32 Manual p208)", "title": "Bad recall of non-volatile memory - This fault can occur if: • A recall from non-volatile memory is attempted by software, but the memory was not available at that time, or • If a memory segment is set to an invalid size, or • If a variable is set..."}, "1085": {"detail": "[Control System] Causes: • For hall nodes - Use the DHN(F/R) Command to determine the HN node ID (first failed node displays). • For car nodes - Use the DCN Command to determine the CN node ID (first failed node displays). • Check all wiring and connections at the failing node. • Invalid configuration - See the DCN and DHN Commands and verify that the port numbers are correct. • Issue the TECC Command to make sure all of the nodes are configured. • A bad CN, HN, or L24 card. (TAC32 Manual p208)", "title": "An SPI error has been detected on an CAN node."}, "1086": {"detail": "[Control System] Normal terminal slowdown limit failure - This fault is normally caused by a sensor, or magnet failure of NTST, NTSB, TSR1, TSR2. If the car is located at a terminal landing: • The CPU inputs for that terminal did not drop out as required to back up normal slowdown. The car is shut down, with a service status of SELECTOR. • The CPU inputs for the other terminal are not in the proper state: – A 1086 error is logged, but car is not shutdown. – A 1062 error will be generated (on the very next run away from that terminal) and the car will run at slow speed to the next stop. • If the car is located at the bottom terminal: • Two consecutive failures of NTSB must occur before the car is shut down, and a 1086 fault is generated with each failure. • If the car is located at the top terminal: • A single failure of NTST, TSL1, or TSL2 will cause the car to shut down. Causes: • An invalid configuration or adjustment of magnets or selector. • Corrupted memory - Install the prior downloaded backup copy of non-volatile memory (this file was previously generated: Service > Transfer > Download from IMS). • See Selector I/O Troubleshooting. (TAC32 Manual p209)", "title": "Normal terminal slowdown limit failure - This fault is normally caused by a sensor, or magnet failure of NTST, NTSB, TSR1, TSR2. If the car is located at a terminal landing: • The CPU inputs for that terminal did not drop out as required to back up..."}, "1087": {"detail": "[Control System] Causes: • A stuck motor contactor auxiliary contact • A defective MCD input • A bad CPU Card (TAC32 Manual p209)", "title": "Valve Contact Off Error - This fault occurs when the car has no run request, but the MCD input indicates that the run circuit contacts were active."}, "1088": {"detail": "[Control System] Causes: • A stuck motor contactor auxiliary contact or starter output. • A defective MCE/MUTS input. • A bad IOD/CPU Card. (TAC32 Manual p209)", "title": "Motor contactor Off - This fault occurs when the car does not have a run request, but the MCE input indicates that the motor contactor was still enabled."}, "1089": {"detail": "[Control System] Causes: • Faulty gate or locks. • Jumpers on the gate or locks. • A defective DCL or CDCF input. • Improper timing between the DCL6, the Gate Switch, the Interlock, and the DCL. Check the door operator six-inch point adjustment. (TAC32 Manual p209)", "title": "The car gate and door locks made, but the door close limit (DCL) was not activated."}, "1094": {"detail": "[Control System] Causes: — (TAC32 Manual p209)", "title": "Hoistway access monitor failure - This fault occurs when INHA and INHAM are in the same state."}, "1095": {"detail": "[Control System] Causes: — (TAC32 Manual p209)", "title": "Dual-post rack error. See 1068."}, "1096": {"detail": "[Control System] Causes: — (TAC32 Manual p209)", "title": "CDCF (gate switch front) failure."}, "1097": {"detail": "[Control System] Causes: — (TAC32 Manual p209)", "title": "CDCR (gate switch rear) failure."}, "1098": {"detail": "[Control System] Causes: — (TAC32 Manual p209)", "title": "Front interlock failed (IF, CF)"}, "1099": {"detail": "[Control System] Causes: — (TAC32 Manual p209)", "title": "Rear interlock failed (IR, CR)."}, "1100": {"detail": "[Control System] Causes: • A defective I/O (CDBM/HDBM). • A defective IOD Card (switch or input). • A defective CPU Card. (TAC32 Manual p209)", "title": "Door bypass failure - This fault occurs when the bypass switches are activated and car does not go on inspection operation."}, "1101": {"detail": "[Control System] Causes: A defective I/O (CDCF, DCL, or CDCFM). (TAC32 Manual p209)", "title": "The front gate made, and DCL did not activate."}, "1102": {"detail": "[Control System] Causes: A defective I/O (CDCR, DCLR, or CDCRM.) (TAC32 Manual p210)", "title": "The rear gate made, and DCLR did not activate."}, "1103": {"detail": "[Control System] (TAC32 Manual p210)", "title": "Door communication loss was detected."}, "1104": {"detail": "[Control System] Causes: • The car doors are clipping interlocks. • A defective I/O (IF/IR/IB/IT/CF/CR/CT/CB). • A defective gate contact. • Defective wiring. (TAC32 Manual p210)", "title": "Gate and lock error - The gate and lock circuit opened during a run."}, "1105": {"detail": "[Control System] Causes: • A defective I/O (CDCF/CDCR or DCL). • A defective car gate contact. • Defective wiring. (TAC32 Manual p210)", "title": "Car door lock error - The car door was not closed when DCL was made during a run."}, "1107": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "Excessive leveling time that exceeds 20 sec."}, "1108": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "Start retry shutdown - The controller will shutdown after 6 consecutive attempts to start a run. MCE or MCD inputs failed."}, "1110": {"detail": "[Control System] Causes: An input and its respective monitor indicates a logically impossible condition or failure; Top and bottom slowdown inputs active at the same time, BLO and BLOM in incorrect state, etc. (TAC32 Manual p210)", "title": "A17/B44 shutdown error - Inspection to reset."}, "1111": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "Indicates that the seismic sensor has been activated."}, "1113": {"detail": "[Control System] Causes: The car is taken out of group service, Error 1113 is logged, and the car will continuously try to run to a different floor. Possible cause: Doors being prevented from closing. (TAC32 Manual p210)", "title": "Car service protection is activated. The car had a reason to move but failed to do so within the Z25 time."}, "1114": {"detail": "[Control System] Causes: Possible Causes: • Leveling speed too fast. • Defective magnet. • Defective selector. Possible Solution: RFL and cycle the inspection switch to reset. (TAC32 Manual p210)", "title": "Selector out of service fault - Door zone."}, "1115": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "The car failed to run because the door held."}, "1116": {"detail": "[Control System] Causes: Controller too hot or cold as sensed by the IOD Card’s temperature sensor. (TAC32 Manual p210)", "title": "Ambient temperature is out of range (-10°C. to 70°C.)"}, "1120": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "Left dynamic sensor did not activate correctly."}, "1121": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "Right dynamic sensor did not activate correctly."}, "1122": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "The car was in already in slowdown when the dynamic sensors activated. Correct magnet/sensor location; dynamic sensors should activate 12 inches before slowdown occurs."}, "1123": {"detail": "[Control System] Causes: Z44 value exceeded with no encoder counts detected. (TAC32 Manual p210)", "title": "Up Run stalled."}, "1124": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "Car top inspection Node B CAN communication is offline."}, "1125": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "HNB Node A top CAN communication is offline."}, "1126": {"detail": "[Control System] Causes: — (TAC32 Manual p210)", "title": "HNB Node A bottom CAN communication is offline."}, "1127": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "HNB Node B top CAN communication is offline."}, "1128": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "HNB Node B bottom CAN communication is offline."}, "1129": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "SEL Node A/B data mismatch."}, "1130": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "Car top inspection Nodes A/B data mismatch."}, "1131": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "HNB top Nodes A/B data mismatch."}, "1132": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "HNB bottom Nodes A/B data mismatch."}, "1133": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "SEL Node A reported a duplicate node."}, "1134": {"detail": "[Control System] Causes: — (TAC32 Manual p211)", "title": "SEL Node B r cessor] Causes: • Reload the generic and job software. • Replace the CPU Card. (TAC32 Manual p222)", "title": "The test outputs were not commanded within three (3) automatic runs."}, "2713": {"detail": "[Safety Processor] Causes: • Issue an FLT Command. • Check all wiring/connections to the IOD Card. • Replace the IOD Card. (TAC32 Manual p222)", "title": "Safety string output test failure."}, "2714": {"detail": "[Safety Processor] Causes: IOD Card device failure - Try RFL, TFR, and cycle INSP to reset. If it returns or is chronic, replace the IOD Card. (TAC32 Manual p223)", "title": "CHKHA crosscheck failure."}, "2715": {"detail": "[Safety Processor] Causes: • Check the car CAN channel. • Check TSMC. (TAC32 Manual p223)", "title": "TSMC data message was not received."}, "2716": {"detail": "[Safety Processor] Causes: • Check the car CAN channel. • Check the CWIL. (TAC32 Manual p223)", "title": "Car top data message was not received."}, "2717": {"detail": "[Safety Processor] Causes: • Check the hall CAN channel. • Check the HNB Card. (TAC32 Manual p223)", "title": "Top hoistway access data message was not received."}, "2718": {"detail": "[Safety Processor] (TAC32 Manual p223)", "title": "Bottom hoistway access data message was not received."}, "2719": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Replace the TSM Card. (TAC32 Manual p223)", "title": "A corrupted TSMC Node A CAN message was received."}, "2720": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Replace the TSM Card. (TAC32 Manual p223)", "title": "A corrupted TSMC Node B CAN message was received."}, "2721": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Replace the CWIL Card. (TAC32 Manual p223)", "title": "A corrupted car top CAN message was received."}, "2722": {"detail": "[Safety Processor] Causes: • Check Hall CAN loading, connections, and cable routing. • Replace the HNB Card. (TAC32 Manual p223)", "title": "A corrupted top hoistway access CAN message was received."}, "2723": {"detail": "[Safety Processor] Causes: • Check Hall CAN loading, connections, and cable routing. • Replace the HNB Card. (TAC32 Manual p223)", "title": "A corrupted bottom hoistway access CAN message was received."}, "2724": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections and cable routing. • Indicates noise on the Car CAN channel or failing communication chip on the CPU. (TAC32 Manual p223)", "title": "A corrupted main CPU CAN message was received."}, "2725": {"detail": "[Safety Processor] Causes: Verify that there is only one TSMC connected. (TAC32 Manual p223)", "title": "A duplicate TSMC Node was detected."}, "2726": {"detail": "[Safety Processor] Causes: • Verify that there is only one CWIL connected. • Perform SPC, then TECC the nodes. (TAC32 Manual p223)", "title": "A duplicate car top node was detected."}, "2727": {"detail": "[Safety Processor] Causes: • The HNB is connected; it needs to be set up. • Isolate the master car with the new HNB. • Set up the card/riser again. • Reconnect to the group. (TAC32 Manual p223)", "title": "A duplicate top hoistway access node was detected."}, "2728": {"detail": "[Safety Processor] Causes: • The HNB is connected; it needs to be set up. • Isolate the master car with the new HNB. • Set up the card/riser again. • Reconnect to the group. (TAC32 Manual p223)", "title": "A duplicate bottom hoistway access node was detected."}, "2729": {"detail": "[Safety Processor] Causes: Check the car CAN termination. (TAC32 Manual p223)", "title": "A car CAN channel bus Off failure."}, "2730": {"detail": "[Safety Processor] Causes: Check the hall CAN termination. (TAC32 Manual p223)", "title": "A hall CAN channel bus Off failure."}, "2731": {"detail": "[Safety Processor] Causes: — (TAC32 Manual p223)", "title": "An input failure was detected."}, "2732": {"detail": "[Safety Processor] Causes: — (TAC32 Manual p224)", "title": "A programming jumper was enabled."}, "2733": {"detail": "[Safety Processor] Causes: • Failed device on the IOD Card. • A power event can cause this fault. (TAC32 Manual p224)", "title": "A/C peak reference timeout – The SP has lost A/C power, so the A/C inputs cannot be sampled."}, "2734": {"detail": "[Safety Processor] Causes: — (TAC32 Manual p224)", "title": "A relevel with FAST solenoid detected."}, "2735": {"detail": "[Safety Processor] Causes: Check CWIL connections. (TAC32 Manual p224)", "title": "Car top inspection node crosscheck error."}, "2736": {"detail": "[Safety Processor] Causes: • Verify 24VDC supply to HNB card and fusing. • Replace the HNB Card. (TAC32 Manual p224)", "title": "Top HWAC Node A / Node B crosscheck error."}, "2737": {"detail": "[Safety Processor] Causes: • Verify 24VDC supply to HNB card and fusing. • Replace the HNB Card. (TAC32 Manual p224)", "title": "Bottom HWAC Node A / Node B crosscheck error."}, "2738": {"detail": "[Safety Processor] Causes: • Failing input/output on the IOD Card - Try RFL, TFR, and cycle INSP to reset. • Remove any wires from IOD CON46. • Verify that the valve solenoid wiring matches the wiring diagrams. (TAC32 Manual p224)", "title": "TSRCPM lost during output test."}, "2739": {"detail": "[Safety Processor] Causes: • Check power to the selector. • Check Car CAN channel. • Replace TSMC. (TAC32 Manual p224)", "title": "TSMC message was not received at power ON."}, "2740": {"detail": "[Safety Processor] Causes: Check Car CAN channel and CWIL Card. (TAC32 Manual p224)", "title": "Car top inspection message was not received at power ON."}, "2741": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Indicates noise on the Car CAN channel or failing communication chip on the CWIL. (TAC32 Manual p224)", "title": "A corrupt message from CWIL Node B. The system responds with an open safety string."}, "2742": {"detail": "[Safety Processor] Causes: • Check Hall CAN loading, connections, and cable routing. • Indicates noise on the Hall CAN channel, or failing communication chip on one or more HN/ HNB Cards. (TAC32 Manual p224)", "title": "A corrupt message from Top HNB Node B. The system responds with an open safety string."}, "2743": {"detail": "[Safety Processor] Causes: • Check the Hall CAN loading, connections, and cable routing. • Indicates noise on the Hall CAN channel, or failing communication chip on one or more HN/ HNB Cards. (TAC32 Manual p224)", "title": "A corrupt message from Bottom HNB Node B. The system responds with an open safety string."}, "2744": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Indicates noise on the Car CAN channel, or failing communication chip on the TSMC. (TAC32 Manual p224)", "title": "A data comparison mismatch between TSMC Node A and Node B. The system responds with an open safety string."}, "2745": {"detail": "[Safety Processor] Causes: Caused by noise - • Check all CAN loading, connections, cable routing. Check ground connection to IOD card. • If it continues, replace the IOD Card (TAC32 Manual p224)", "title": "Internal micro processor fault - The watch dog failed to trigger. The system responds with an open safety string, and resets the micro processor."}, "2746": {"detail": "[Safety Processor] (TAC32 Manual p224)", "title": "Detected RAM failure of the safety data. The system responds with an open safety string, and resets the micro processor."}, "2747": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Indicates noise on the Car CAN channel or failing communication chip on the TSMC. (TAC32 Manual p225)", "title": "SPH failed to detect a TSMC message within 3 seconds. The system responds with an open safety string, and CAN communications with CWIA Node B are restored."}, "2748": {"detail": "[Safety Processor] Causes: Check Car CAN channel and CWIL Card. (TAC32 Manual p225)", "title": "No CWIA Node B message was detected within 3 seconds. The system responds with an open safety string, and CAN communications with CWIA Node B are restored."}, "2749": {"detail": "[Safety Processor] Causes: No Top HNB Node B message was detected within 3 seconds. The system responds with open safety string (if on HWAC Enable), and CAN communications with Top HNB Node B are restored. (TAC32 Manual p225)", "title": "Top HWAC B message timeout."}, "2750": {"detail": "[Safety Processor] Causes: No Bottom HNB Node B message was detected within 3 seconds. The system responds with open safety string (if on HWAC Enable), and CAN communications with Top HNB Node B are restored. (TAC32 Manual p225)", "title": "Bottom HWAC B message timeout."}, "2751": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Indicates noise on the Car CAN channel or failing communication chip on the TSMC. (TAC32 Manual p225)", "title": "Duplicate Selector safety node detected."}, "2752": {"detail": "[Safety Processor] Causes: • Check Car CAN loading, connections, and cable routing. • Indicates noise on the Car CAN channel or failing communication chip on the CWIL. (TAC32 Manual p225)", "title": "Duplicate car top safety node detected."}, "2753": {"detail": "[Safety Processor] Causes: All connected cars in the group are shutdown until this is resolved. Teach and configure the riser or HNB. See HNB Replacement Procedure. (TAC32 Manual p225)", "title": "Duplicate top HNB safety node detected."}, "2754": {"detail": "[Safety Processor] Causes: All connected cars in the group are shutdown until this is resolved. Teach and configure the riser or HNB. See HNB Replacement Procedure. (TAC32 Manual p225)", "title": "Duplicate bottom HNB safety node detected."}, "2755": {"detail": "[Safety Processor] Causes: — (TAC32 Manual p225)", "title": "SP detected a false AC interrupt. Indicates noise on the AC1 supply or poor ground connection to t essor] Causes: • Check the NTST magnet; P17 adjustment too low. • Check the motor and valves. (TAC32 Manual p227)", "title": "The top terminal slowdown was activated – The NP detected NTST active while running Up Fast."}, "2802": {"detail": "[NTSD Processor] Causes: • Check the NTSB magnet; P18 adjustment too low. • Check the motor and valves. (TAC32 Manual p227)", "title": "The bottom terminal slowdown was activated – The NP detected NTST active while running Up Fast."}, "2803": {"detail": "[NTSD Processor] Causes: • Check the NTST magnet; P17 adjustment too low. • Check the motor and valves. • Check the DL magnet. (TAC32 Manual p227)", "title": "The top terminal stopping was activated – The NP detected DL active and NTST active while running Up."}, "2804": {"detail": "[NTSD Processor] Causes: • Check the NTSB magnet; P18 adjustment too low. • Check the motor and valves. • Check the DL magnet. (TAC32 Manual p227)", "title": "The bottom terminal stopping was activated – The NP detected DL active and NTST active while running Up."}, "2805": {"detail": "[NTSD Processor] Causes: • Reload the generic and job software. • Replace the CPU Card. (TAC32 Manual p227)", "title": "The test outputs were not commanded within three automatic runs."}, "2806": {"detail": "[NTSD Processor] Causes: • RFL, RRF. • Use a meter to check the UFS output during a Auto Up run. If no VAC, then use job diagrams to troubleshoot the output voltage supply. • If the VAC measurement is correct, then replace the IOD card. (TAC32 Manual p227)", "title": "A FAST solenoid output test failure."}, "2807": {"detail": "[NTSD Processor] Causes: • Issue an FLT command. • Check all wiring/connections to the IOD Card. • Replace the IOD Card. (TAC32 Manual p227)", "title": "A safety string output test failure."}, "2808": {"detail": "[NTSD Processor] Causes: • Check the car CAN channel. • Check the TSMC. (TAC32 Manual p227)", "title": "A TSMC data message Node A was not received."}, "2809": {"detail": "[NTSD Processor] Causes: • Check the Car CAN loading, the connections, and the cable routing. • Replace the TSM Card. (TAC32 Manual p227)", "title": "A corrupted TSMC Node A CAN message was received."}, "2810": {"detail": "[NTSD Processor] Causes: • Check the Car CAN loading, the connections, and the cable routing. • Replace the TSM Card. (TAC32 Manual p227)", "title": "A corrupted TSMC Node B CAN message was received."}, "2811": {"detail": "[NTSD Processor] Causes: • Indicates noise on the Car CAN channel or failing communication chip on the CPU. • Check the Car CAN loading, the connections, and the cable routing. (TAC32 Manual p227)", "title": "A corrupted main CPU CAN message was received"}, "2812": {"detail": "[NTSD Processor] Causes: — (TAC32 Manual p227)", "title": "A duplicate TSMC Node A was detected."}, "2813": {"detail": "[NTSD Processor] Causes: Check the Car CAN channel loading, cable routing, shielding, and connections. (TAC32 Manual p227)", "title": "A car CAN channel bus Off failure."}, "2814": {"detail": "[NTSD Processor] Causes: — (TAC32 Manual p227)", "title": "A programming jumper was enabled."}, "2815": {"detail": "[NTSD Processor] Causes: • Failed device on the IOD Card. • A power event can cause this fault. (TAC32 Manual p227)", "title": "A/C peak reference timeout - The NP lost A/C power, so the A/C inputs cannot be sampled."}, "2816": {"detail": "[NTSD Processor] Causes: — (TAC32 Manual p227)", "title": "A duplicate TSMC Node B was detected."}, "2817": {"detail": "[NTSD Processor] Causes: • Check the car CAN channel. • Check the TSMC. (TAC32 Manual p228)", "title": "A TSMC data message Node B was not received."}, "2818": {"detail": "[NTSD Processor] Causes: — (TAC32 Manual p228)", "title": "A TSMC Node A and Node B data mismatched."}, "2819": {"detail": "[NTSD Processor] Causes: Perform SPC again. If the fault is persistent, replace the IOD Card. (TAC32 Manual p228)", "title": "NP failed to configure the IOD FPGA."}, "2820": {"detail": "[NTSD Processor] Causes: Check DFS output and solenoid wiring. (TAC32 Manual p228)", "title": "Bottom limit override and running fast."}, "2821": {"detail": "[NTSD Processor] Causes: • Failing input/output on the IOD Card - Try RFL, TFR, and cycle INSP to reset. • Verify that the valve solenoid wiring matches the wiring diagrams. (TAC32 Manual p228)", "title": "TSRCPM went false during fast valve test."}, "2822": {"detail": "[NTSD Processor] Causes: • Failing input/output on the IOD Card - Try RFL, TFR, and cycle INSP to reset. • Verify that the valve solenoid wiring matches the wiring diagrams. (TAC32 Manual p228)", "title": "TSRCPM went false during safety string output test."}, "2823": {"detail": "[NTSD Processor] Causes: • Check power to the selector. • Check the Car CAN channel. • Replace the TSMC. (TAC32 Manual p228)", "title": "Selector message timed out at power ON."}, "2824": {"detail": "[NTSD Processor] Causes: • Indicates noise in the system interfering with communication and timing.. • Check the Car and Hall CAN loading, the connections, the cable routing and ground connections to the controller and the IOD card. (TAC32 Manual p228)", "title": "An internal micro processor fault - The watch dog failed to trigger."}, "2825": {"detail": "[NTSD Processor] Causes: — (TAC32 Manual p228)", "title": "Detected bad internal RAM."}, "3000": {"detail": "[Control System] Causes: — (TAC32 Manual p217)", "title": "Group Level Service Protect Fault - The car was assigned a hall call or destination call by the group master but did not respond within the time period specified by adjustment Z25."}, "3001": {"detail": "[Control System] Causes: — (TAC32 Manual p217)", "title": "Destination call was lost because a car went out of service."}, "3002": {"detail": "[Control System] Causes: Perform a new hoistway setup/scan, verify the correct job software is installed in the CPU. Verify correct number of floor magnets installed. (TAC32 Manual p217)", "title": "Invalid floor position."}, "3003": {"detail": "[Control System] Causes: — (TAC32 Manual p217)", "title": "The emergency phone detected failure of phone line."}, "3004": {"detail": "[Control System] Causes: • Perform a new hoistway setup/scan, verify the correct job software is installed in the CPU. • Verify correct number of floor magnets installed. (TAC32 Manual p218)", "title": "Incorrect floor position or incorrect number of floors."}, "3005": {"detail": "[Control System] (TAC32 Manual p218)", "title": "Car stuck in Resident Mode - Clearing calls"}, "3006": {"detail": "[Control System] (TAC32 Manual p218)", "title": "Orphaned Hall Call - Dispatching error"}, "3007": {"detail": "[Control System] (TAC32 Manual p218)", "title": "Call pool is full, cannot allocate new calls. Reset is required."}, "5001": {"detail": "[Control System] (TAC32 Manual p218)", "title": "CAN communication loss to UBOX"}, "5299": {"detail": "[Control System] Causes: Bucher Relay Test: BVSMT or BVSM failed. Bucher Valve Interface, TFR to reset Note: only applies to Bucher Valve jobs. At start of each run, controller activates BVSMT and validates BVSM, input goes false. To check that Bucher fault monitoring is functional - if (BVSM = BVSMT) then fault is logged. Possible Cause(s): • Bucher firmware version is incorrect. • Generic upgraded to V6R4P or later but failed to update Bucher firmware (the update was not completed). • Wiring issue between controller and Bucher value (see BVSMT, BVSM ). • Original job image, without BVSMT I/O present. • Defective IOD card. • Defective Bucher Valve interface hardware DELCON PCB. Corrective Action(s): • Perform Bucher Safety Software Update Field Bulletin. • Check wiring between controller and Bucher interface DELCON. • If BVSMT output is working and BVSM input voltage is changing in response, replace IOD card. • Replace Bucher Value DELCON interface PCB. • NTA-2 Power Supply card JP1 jumper set wrong correct position is 2-3. (TAC32 Manual p218)", "title": "Bucher Relay Test Failed (output BVSMT or input BVSM) at the start of a run from floor level. The test is executed at the start of a run from floor level and inhibits the run when the BVSMT Test fails."}, "6000": {"detail": "Replaces 1008 fault description for TAC2x. | TAC32: INIT Shutdown", "title": "\"Contactor Already Energized (MCD/MCE)”- Init ShutDown."}, "6001": {"detail": "[Motor control fault related to MCE/MCD/MUTS.] Replaces second version of 1008 fault, from software group’s definitions for TAC32H. Checks Made: if controller commanded to start motor but MCD=FALSE or MCE=TRUE then error 1008 | TAC32:", "title": "Fail to start motor."}, "6002": {"detail": "[Valve Monitor Input(s) did not activate after valve output was activated or MCD changed states.] - Init ShutDown. Replaces 1009 fault from TAC2x. Checks Made: if car commanded to run Down Fast: MCE==MCD Mismatch error 1009 As stated above for Contactor Starting on TAC32H. For EMS starting on TAC32H UTS output from starter to MUTS input on the IOD is the circuit of interest. The PLD manufactures MCE/MCD from the MUTS input. | TAC32: INIT Shutdown", "title": "Down Run Fail- Valves or MC not ready."}, "6003": {"detail": "[MUTS, MCE, and/or MCD detected in the wrong state.] Init ShutDown. Replaces 1009 fault from TAC32H. | TAC32: INIT Shutdown", "title": "Down Run Fail- MUTS/MCE/MCD not ready."}, "6004": {"detail": "Replaces fault code 1010 from TAC32H. if MCD=FALSE and MCE=TRUE and MCC1=FALSE for one second then error 1010 | TAC32: INIT Shutdown", "title": "Incomplete Y-Delta Seq (MCD/MCE)- Init ShutDown."}, "6005": {"detail": "Replaces the 1010 fault from TAC50-04 products. if cross-check between DRVEN and BK1M/BK2M; then error 1010", "title": "DRVEN vs BK1M/BK2M Fail."}, "6006": {"detail": "-OR- MCE dropped out during an up run. “Viscosity Shutdown”: Car will perform and emergency stop. Inspection and TFR required to put the back in service. replaces 1009 in this definition with the reused fault code 1009. Check Made: If MCF is ok but MUTS or MCE dropped out during and up run for more than 1/4 second then Error(6006) | TAC32: Viscosity Shutdown", "title": "UP Run Fail: MUTS dropped out during an up run."}, "6007": {"detail": "A 5th version of 1009 fault, this one for TAC32H. Checks Made- if car commanded to run Up Fast: MCE==MCD Mismatch error 1009 | TAC32: Viscosity Shutdown", "title": "UP Run Fail: MUTS/MCE failed when running- Viscos Insp,TFR."}, "6008": {"detail": "Replaces a version of the 1011 fault if controller is trying to energized the master contactor and MCF fails to go active for > than ? seconds then shutdown controller - manual reset required record error 1011 | TAC32: Viscosity Shutdown", "title": "Electronic Contactor Fault (MCF)- Viscos Insp,TFR."}, "6009": {"detail": "Replaces 1021 fault with same definition. Verify SP, NP, and car CAN channel devices are online as first step - most of the time it is a whole CAN channel having an issue caused by on failed device on that network. | TAC32:", "title": "Safety Node is offline."}, "6010": {"detail": "Replaces 1022 fault version – Run Protect Timer Expired. | TAC32:", "title": "Car motion fail, “Ran too Long”."}, "6011": {"detail": "", "title": "Car motion fail- Drive Over-Temp, Replaces 1022 definition for TAC50-04."}, "6012": {"detail": "Replaces 1027 fault version DZ1=DZ1M. | TAC32:", "title": "DZ Mon Error 2 - DZ1=DZ1M."}, "6013": {"detail": "| TAC32:", "title": "DZ Mon Error 3 - DZ2=DZ2M Replaces 1027 fault version DZ2=DZ2M."}, "6014": {"detail": "Replaces 1027 fault with the same description and no details. | TAC32:", "title": "DZ Mon Error 4."}, "6015": {"detail": "Replaces 1027 fault with the same description and no details. | TAC32:", "title": "DZ Mon Error 5."}, "6016": {"detail": "Replaces 1030 fault with the same description and no details. Note: V6r4N or later corrects issues with TAC32 and false 1030 faults with Close Landing/Short Floors. | TAC32:", "title": "Level Seq Error 2."}, "6017": {"detail": "“Run Monitor” Replaces 1030 fault with the same description and no details. Note: V6r4N or later corrects issues with TAC32 and false 1030 faults with Close Landing/Short Floors. | TAC32: RUN Monitor", "title": "Level Seq Error 3 - Car was at the floor and then both LU and LD leveling sensors when to the false (always from floor state at the same time)."}, "6018": {"detail": "Replaces 1030 fault with the same description and no details. Note: V6r4N or later corrects issues with TAC32 and false 1030 faults with Close Landing/Short Floors. | TAC32:", "title": "Level Seq Error 4."}, "6019": {"detail": "Replaces 1030 fault with the same description and no details. Note: V6r4N or later corrects issues with TAC32 and false 1030 faults with Close Landing/Short Floors. | TAC32:", "title": "Level Seq Error 5."}, "6020": {"detail": "Top Term Magnet [active] & not at Top Floor. Replaces 1033 fault iteration 1. | TAC32:", "title": "Selector position error."}, "6021": {"detail": "Replaces 1033 fault iteration 2. | TAC32:", "title": "Selector position error - Bottom Term Magnet [active] & not at Bottom Floor."}, "6022": {"detail": "At Terminal but no Terminal Magnet [active. Replaces fault 1033 fault iteration 3. | TAC32:", "title": "Selector position error."}, "6023": {"detail": "Replaces fault 1058 iteration 2. Bad hoistway scan in memory (perform a new hoistway scan). Bad CPU battery, Encoder wiring, noise, failing encoder, low or failing power supply, encoder inputs in controller failing, or failing CPU. | TAC32:", "title": "Bad Selector Position at DLT (top normal directional limit), encoder count out of tolerance while magnets indicate the car is on the top normal limit."}, "6024": {"detail": "Replaces 1072 iteration 1. | TAC32:", "title": "HW Ckt - GL1M, GL2M Fail (inputs for custom engineered solution)."}, "6025": {"detail": "Replaces fault 1072 iteration 2. | TAC32:", "title": "CDCF Fail (Car Door Contact Front – gate switch)."}, "6026": {"detail": "| TAC32:", "title": "HDIF Fail (Hoistway Door Interlock Front, TAC50-04) Replaces fault 1072 iteration 3."}, "6027": {"detail": "Replaces fault 1072 iteration 4. | TAC32:", "title": "CDCR Fail (Car Door Contact Rear – gate switch)."}, "6028": {"detail": "Replaces 1072 iteration 5. | TAC32:", "title": "HDIR Fail (Hoistway Door Interlock Rear, TAC50-04)."}, "6029": {"detail": "Replaces 1072 iteration 6. | TAC32:", "title": "BYPASS Fail Car Door or Hoistway Door Bypass input error: CDBM, CDBM2, HDBM, HDBM2."}, "6030": {"detail": "Replaces fault 1073 iteration 1. DR used to be the Gate Switch input (replaced by CDCF). If this fault is logged check the door operator inputs, this fault reads as Door Open Limit is active (indicating an open door) and another input indicates the door is closed, door input error. | TAC32:", "title": "Rear DOL detect, DR active."}, "6031": {"detail": "Replaces fault 1086 iteration 1. NTSB should be active (metered logic) at the Bottom Landing and was seen as not active at the bottom landing. If car is stopped at the bottom floor and NTSB sensor (selector input from magnet) is NOT active - then 6031 and car is shutdown if condition persists for 10 cycles. | TAC32:", "title": "NTSD: !NTSB at Bottom Landing."}, "6032": {"detail": "Replaces fault 1086 iteration 2. NTSB should not be active (metered logic) at the Top Landing and was seen as active at the top landing. If car is stopped at the top floor and NTSB sensor (selector input from magnet) is active - then 6032 and car is shutdown. | TAC32:", "title": "NTSD: NTSB at Top Landing."}, "6033": {"detail": "Replaces fault 1086 iteration 3. TSR1, TSR2, & NTST should be active (metered logic) at the Top Landing and one or more of the inputs was/were seen as not active at the top landing. If car is stopped at the top floor and NTST or TSR1 or TSR2 fail to function a 6033 fault will be logged and the controller will not permit High speed up. Every time this fault happens TopFailCNT will increment. After TopFailCNT reaches 10 the car will be shutdown. | TAC32:", "title": "NTSD: !(TSR1 & TSR2 & NTST) at Top Landing."}, "6034": {"detail": "Replaces fault 1086 iteration 4. NTST and NTSB were seen as not active at a normal direction limit – NTST/NTSB input failed error. Car is ready to run, selector A and B are online and no NTSD faults are logged. Car is at a terminal floor on a Normal Limit [DL] and either NTSB or NTST failed to activate. [Physical magnet length dictates that NTSx activates before DL.] Both UP and DOWN fast are not allowed with this fault. Every time this fault happens BotFailCNT will increment. After BotFailCNT reaches 11 the car will be shutdown. | TAC32:", "title": "NTSD: DL & !(NTST | NTSB)."}, "6035": {"detail": "Replaces fault 1089 iteration 2. | TAC32:", "title": "Door Opening - Front GATES/LOCKS Remain Active."}, "6036": {"detail": "Replaces fault 1089 iteration 3. All gate/lock inputs indicate the rear door is closed; however, the door close limit rear input is not active. Check the rear door operator limit. | TAC32:", "title": "GATES/LOCKS detect, no DCLR."}, "6037": {"detail": "Replaces fault 1089 iteration 4. Rear Gate/Lock inputs remain active after the door has opened (off the close limit). | TAC32:", "title": "Door Opening - Rear GATES/LOCKS Remain Active."}, "6038": {"detail": "CDCF/CDCR opened causing the safety string to open. NOTE: This may not be the only cause for the string to open. But the safety string did open and either CDCF or CDCR is open. Result: Not a latching fault but if car is in running it will do an emergency stop. Check Made: IF car is on AUTOMATIC operation IF safety STRING OPENS IF CDCF = FALSE or CDCR = FALSE Error(6038) | TAC32: • CDCF/CDCR opened causing the safety string to open. Note: This may not be the only cause for the string to open. But the safety string did open and either CDCF or CDCR is open. • Not a latching faul", "title": "CDCF/CDCR open #2."}, "6039": {"detail": "Drive Enable detected as active from the drive when the controller did not provide the DRVE signal to the drive.", "title": "DRVE=1."}, "6040": {"detail": "The drive failed to echo the correct state for SAFE over CAN.", "title": "DRVE SAFE."}, "6041": {"detail": "The drive failed to echo the correct state for SAF2 over CAN.", "title": "DRVE SAF2."}, "6042": {"detail": "The drive failed to echo the correct state for SAF3 over CAN.", "title": "DRVE SAF3."}, "6043": {"detail": "The drive failed to echo the correct state for SAF4 over CAN.", "title": "DRVE SAF4."}, "6044": {"detail": "The drive failed to echo the correct state for SAF5 over CAN.", "title": "DRVE SAF5."}, "6045": {"detail": "PLD fault: overspeed (76FPM or more) while on Inspection Operation.", "title": "FLTC: > 75fpm and Insp | Leveling Latched-CLR_FLT button."}, "6046": {"detail": "Latched-CLR_FLT button PLD fault: Inspection operation active, no demand to move; however, car movement detected. | TAC32:", "title": "FLTD: Insp and no Up/Dn and Car Moving On."}, "6047": {"detail": "| TAC32:", "title": "FLTG: PLD spi Data Integrity fault."}, "6048": {"detail": "| TAC32:", "title": "FLTH: PLD spi Data Integrity fault."}, "6049": {"detail": "| TAC32:", "title": "FLTI: PLD spi Data Integrity fault."}, "6050": {"detail": "", "title": "Run Aborted SAFE Inactive."}, "6051": {"detail": "SAF3 is a serialized input from the drive indicating a drive fault has occurred.", "title": "Run Aborted SAF3 Inactive."}, "6052": {"detail": "ETSX, SP, or CPU detected a fault condition, check additional fault codes for more information.", "title": "Run Aborted SAF4 Inactive."}, "6053": {"detail": "Interlock/Gate inputs indicated a door was open during a run.", "title": "Run Aborted SAF5 Inactive."}, "6054": {"detail": "DRVE is communicated over Drive CAN.", "title": "Run Aborted DRVE Inactive."}, "6055": {"detail": "(TAC50-04 32bit) | TAC32:", "title": "Run Aborted BRKE Inactive."}, "6056": {"detail": "| TAC32:", "title": "Run Aborted UP/DN Inactive"}, "6057": {"detail": "| TAC32:", "title": "Run Aborted other (not gates/locks, door limit, or any SAFx input)"}, "6058": {"detail": "INCT, INCTM, INHAM, INCNM, INCN were seen in a state not ready for Automatic, monitor input could have blipped or a switch toggled or its contacts bounced. | TAC32:", "title": "Run Aborted Inspection Activated."}, "6059": {"detail": "Replace the CPU battery. GET command check for NV errors. WRT. Reset the CPU. GET again if TAG error then enter TAG### where ### is the value returned from GET minus 1. WRT. Reset the CPU again. GET if TAG error remains then reload generic and job image software files. Should the NV TAG error return then repair/replace the CPU card (the UIT stays with the elevator controller). | TAC32:", "title": "Group NV Bad NV allocation."}, "6060": {"detail": "| TAC32:", "title": "NP End-Of-Run Test failed- Safeties: TFR"}, "6061": {"detail": "| TAC32:", "title": "SPH End-Of-Run Test failed- Safeties: TFR"}, "6062": {"detail": "", "title": "SPT End-Of-No Response- Safeties: TFR"}, "6063": {"detail": "", "title": "TGRD or TGRDC active while car away from 1'st floor - RRF to reset."}, "6064": {"detail": "| TAC32:", "title": "NTST clamp by CPUA."}, "6065": {"detail": "Car failed to initiate slowdown running into the bottom floor. Non-latching. if (hydro car is running down) if (iNTSB == TRUE) AND (DFS == TRUE) Error (6065) Possible Cause(s): P18 is set incorrectly - try increasing. NTSB is not at the correct position - magnet moved, etc. NTSB sensor is not working. | TAC32: • Car is running down and NTSB (Normal Terminal Slowdown Bottom) goes active but FAST DOWN solenoid is still active. Car failed to initiate slowdown running into the bottom floor. • Fast Solenoid is d", "title": "NTST Speed clamp by CPUA Car is running down and NTSB (Normal Terminal Slowdown Bottom) goes active but FAST DOWN solenoid is still active."}, "6066": {"detail": "Replaces 1005 fault, see 1005 fault. DOLR active and the interlock is also active – indicating the hoistway door is closed and the car door is open. Door will remain open until fault condition is cleared. Car will not run. Car is removed from group service. If (DOLR and Rear Hoistway Interlock are both TRUE. Code assume the interlock is jumped or failed closed. | TAC32: • Door will remain open until fault condition is cleared. Car will not run. Car is removed from group service. • If (DOLR and Rear Hoistway Interlock are both TRUE. Code assume the interlock is jumped", "title": "DOLR detect, HW active."}, "6067": {"detail": "Check Made: if in target run and internal s/w emergency stop then error 6067. | TAC32: If in target run and internal s/w emergency stop, then log error 6067.", "title": "Run Aborted Emergency Stop Commanded due to internal software emergency stop during a target run to another floor."}, "6068": {"detail": "| TAC32:", "title": "Run Aborted Controlled Run Commanded."}, "6069": {"detail": "BSLM or BSLE did not activate after the brake regulator provided current to the brake coil(s). Check lift switches and wiring. Check brake parameters to the brake coil nameplate, verify wiring and coil resistance. Verify brake air gaping or brake are tensions per manufacturer documentation.", "title": "Run Aborted Brake Failed to Lift."}, "6070": {"detail": "Car does and emergency stop - not latching. If safety string closes car will go back into service. Any input that is safety related (doors, final, safety switch, compensation pull out switch, etc) briefly flickering has been known to cause this fault and is not always easy to catch in a logfile. Check all safety related switches systematically for bad adjustment, poor connections, or bad switches/switch cams. If RGOK, SAFE, SAF2, SAF3, SAF4, SAF5 go false during a run then Log error 6070. | TAC32: Note: same as 1007, typically logged together. • See CMD-FLT to get specific safety string input that opened during run. • Car does an emergency stop - not latching. If safety string closes car will g", "title": "Safety String Opened during run."}, "6071": {"detail": "| TAC32:", "title": "Run Aborted Lost Permission to Run at Floor."}, "6072": {"detail": "| TAC32:", "title": "OVR_POSITION_ERR"}, "6073": {"detail": "| TAC32:", "title": "OVR_REVERSAL_CALL_UP"}, "6074": {"detail": "| TAC32:", "title": "OVL_REVERSAL_CALL_DN"}, "6075": {"detail": "| TAC32:", "title": "OVL_INVALID_FL"}, "6076": {"detail": "| TAC32:", "title": "OVR_INV_TARG_POS"}, "6077": {"detail": "| TAC32:", "title": "OVL_INV_DEMAND_VELOCITY"}, "6078": {"detail": "| TAC32:", "title": "OVL_INVALID_CAR_VELOCITY"}, "6079": {"detail": "| TAC32:", "title": "OVL_INVALID_MODE"}, "6080": {"detail": "| TAC32:", "title": "OVL_INV_RUNTIME"}, "6081": {"detail": "| TAC32:", "title": "OVL_INV_DPP_1"}, "6082": {"detail": "| TAC32:", "title": "OVL_INV_DPP_2"}, "6083": {"detail": "| TAC32:", "title": "OVL_INV_SLOWDOWN"}, "6084": {"detail": "", "title": "TAC5004_SELECTOR_RESET"}, "6085": {"detail": "", "title": "A17 Unintended Car Movement INSP- SFR reset."}, "6086": {"detail": "2 Month Expiration Warning. Obtain New Remote Service Key [Agilekey.us@tkelevator.com] | TAC32: 2 Month Expiration Warning [AGILE MOBILE] Obtain New Remote Service Key from agilekey.us@tkelevator.com", "title": "Remote Service Key will expire in 2 months (see S58)."}, "6087": {"detail": "CPU battery in backwards or MAC address conflict. 1 Month Expiration Warning. | TAC32: CPU battery in reverse or MAC address conflict. 1 Month Expiration Warning [AGILE MOBILE] Corrective Action: Obtain New Remote Service Key from agilekey.us@tkelevator.com", "title": "Remote Service Key will expire in 1 month (see S58)."}, "6088": {"detail": "| TAC32: Remote Service Key expired - Remote Service Operation Shutdown. [AGILE MOBILE] Corrective Action: Obtain New Remote Service Key from agilekey.us@tkelevator.com", "title": "Remote Service Key shutdown (contact Agilekey.us@tkelevator.com for key) Remote Service Key expired - Remote Service Operation Shutdown."}, "6089": {"detail": "Ropes have been used for 250,000 cycles or one year has elapsed since last inspection and unit requires a new rope inspection. Car will continue to run normally - just MAX cloud is made aware, so a rope inspection can be scheduled. Once car is made 250000 operations at the busiest floor a 6089 is generated.", "title": "Ropes require inspection."}, "6090": {"detail": "Perform a rope inspection and enter RPLI command. Car will continue to run normally - just MAX cloud is made aware so a rope inspection can be scheduled. Check Made: Once car has run and additional 10,000 runs after an requested inspection. Possible Cause(s): Rope inspection not done or for forgot to issue RPLI.", "title": "Ropes have not been inspected and another 10,000 runs have been completed."}, "6091": {"detail": "RPLI command was entered. MAX cloud is updated that rope inspection has been performed.", "title": "Rope inspection has been performed."}, "6092": {"detail": "RPLR command was issued. RPLR was entered in the remote fast after a rope replacement was completed.", "title": "Ropes have been replaced - MAX Cloud update message."}, "6093": {"detail": "MAX cloud is updated that drive sheave runout sensor is active. IF IO-TGLDS input changes inactive → active then log error 6093.", "title": "TGL Drive sheave runout sensor warning (TGLDS) is active."}, "6094": {"detail": "MAX cloud is updated that drive sheave runout sensor is inactive. IF IO-TGLDS input changes active → inactive then log error 6094.", "title": "TGL Drive sheave runout sensor warning (TGLDS) is NOT active."}, "6095": {"detail": "RUN MONITOR state - car shutdown. IF IO-TGLDS2 input active log error 6095.", "title": "Drive sheave runout sensor shutdown (TGLDS2) is has activated."}, "6096": {"detail": "Fault - TWCF [input] was activated. Check Ethernet to emergency phone, check UPS/Battery have power and are providing power to the TWC system. | TAC32:", "title": "Two Way Comm."}, "6097": {"detail": "Belt bounce friction device did not fully disengage on first attempt. Proximity Switch out of adjustment or broken.", "title": "Belt bounce friction device failed to disengage - Engaged Sensor Inactive Stop car and attempt recovery, resume service if successful."}, "6098": {"detail": "Attempted 3 times to disengage belt bounce friction device and was unsuccessful. Verify device moves properly. Verify disengaged limit switch activates.", "title": "FLT-6097 recovery failed Car removed from service."}, "6099": {"detail": "Proximity Switch out of adjustment or broken.", "title": "Belt bounce friction device failed to engage - Disengaged Sensor Inactive Belt bounce friction device did not fully engage."}, "6100": {"detail": "", "title": "Belt bounce friction device invalid IO Check for broken proximity sensors."}, "6101": {"detail": "Belt bounce friction device did not disengage on first attempt or its motor did not run.", "title": "Belt bounce friction device failed to disengage - Engaged Sensor Active Stop car and attempt recovery, resume service if successful."}, "6102": {"detail": "Belt bounce friction device did not engage or its motor did not run.", "title": "Belt bounce friction device failed to engage - Disengaged Sensor Active."}, "6103": {"detail": "Update to CWIP V40 or newer", "title": "Belt bounce friction device CWIP version insufficient, CWIP is V39 or older."}, "6106": {"detail": "Input CWRBMX activated. Car is level at top floor and the Upper Counterweight Runby Sensor (Input CWRBU) is inactive, indicating the counterweight is above the upper sensor.", "title": "Counterweight Bottom Run-By exceeds maximum value."}, "6107": {"detail": "Fault is logged for MAX, Loadweigher readings have changed.", "title": "Loadweigher no load reading have drifted beyond ADJ-Z101."}, "6108": {"detail": "Car is level at top floor and both the Upper Counterweight Run-by Sensor (Input CWRBU) and the Lower Counterweight Run-by Sensor (Input CWRBL) are active, indicating the counterweight is below the lower sensor.", "title": "Co nd Sensor", "WINDI": "Wind Sensor Indicator", "WSPD": "Wind Sensor Shutdown Input - When active, reduces speed & rates to M106/M69 and shuts down car at first available landing. WSPD overrides LTSP2. Overridden by PH1 and PH2.", "XSEC": "Security Operation Override", "ZONE1": "Output Goes Active when Car is Below Specified Zone", "ZONE2": "Output Goes Active when Car is Between Upper and Lower Zones"};

  /* ---------------- state ---------------- */
  const state = {
    rows: [],
    faults: [],
    activeTypes: new Set(['ERROR', 'INPUT', 'OUTPUT', 'INFO']),
    keyword: '',
    fileName: '',
    startTime: null,
    // fault defs: code -> {title, detail, source}
    defs: Object.fromEntries(Object.entries(DEFAULT_FAULT_DEFS).map(
      ([k, v]) => [k, { title: v.title, detail: v.detail, source: 'built-in' }]
    )),
    // signal defs: NAME -> {desc, source}
    sigDefs: Object.fromEntries(Object.entries(DEFAULT_SIG_DEFS).map(
      ([k, v]) => [k, { desc: v, source: 'built-in (IOTable)' }]
    )),
    defSources: new Set(['built-in']),
  };

  /* ---------------- element refs ---------------- */
  const $ = id => document.getElementById(id);
  const els = {
    fileInput: $('file-input'),

    defsBadge: $('defs-badge'),
