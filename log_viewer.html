  };

  /* ---------------- helpers ---------------- */
  const setStatus = msg => els.status.textContent = msg;
  const escapeHtml = s => (s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
  const updateDefsBadge = () => {
    const nf = Object.keys(state.defs).length;
    const ns = Object.keys(state.sigDefs).length;
    els.defsCount.textContent = `${nf} faults · ${ns} I/O`;
    els.defsBadge.title = 'Loaded sources: ' + Array.from(state.defSources).join(', ');
  };

  function showFatal(msg) {
    els.logContainer.innerHTML = '<div class="error-box">' + escapeHtml(msg) + '</div>';
    els.logContainer.classList.add('active');
    els.dropZone.style.display = 'none';
  }

  /* ---------------- decompression ---------------- */
  function tryDecompress(buffer) {
    const bytes = new Uint8Array(buffer);
    const attempts = [
      { name: 'zlib',        fn: () => pako.inflate(bytes, { to: 'string' }) },
      { name: 'raw deflate', fn: () => pako.inflateRaw(bytes, { to: 'string' }) },
      { name: 'gzip',        fn: () => pako.ungzip(bytes, { to: 'string' }) },
    ];
    for (const a of attempts) { try { return { text: a.fn(), method: a.name }; } catch(_) {} }
    try { return { text: new TextDecoder('utf-8').decode(bytes), method: 'plain text' }; }
    catch (e) { throw new Error('Could not decompress or decode file: ' + e.message); }
  }

  /* ---------------- log parsing ---------------- */
  const LINE_RE = /^(\d+(?:\.\d+)?)\((\d+(?:\.\d+)?)\):\s*(.*)$/;
  const IO_RE   = /^([IO])\[\s*([A-Z0-9_]+)\s*\]/;

  function classify(msg) {
    if (!msg) return 'INFO';
    if (msg.startsWith('I[')) return 'INPUT';
    if (msg.startsWith('O[')) return 'OUTPUT';
    if (/\bError\b/.test(msg)) return 'ERROR';
    return 'INFO';
  }

  function findFaultCode(msg) {
    if (!msg) return null;
    const re = /\b(\d{3,5})\b/g;
    let m;
    while ((m = re.exec(msg)) !== null) {
      if (state.defs[m[1]]) return m[1];
    }
    return null;
  }

  function findSignal(msg) {
    if (!msg) return null;
    const m = IO_RE.exec(msg);
    if (!m) return null;
    return m[2];  // signal name
  }

  function parseDateFromFilename(name) {
    if (!name) return null;
    const m = name.match(/(\d{4})[_-](\d{2})[_-](\d{2})[_-](\d{2})[_-](\d{2})[_-](\d{2})/);
    if (!m) return null;
    const [, y, mo, d, hh, mm, ss] = m.map(Number);
    const dt = new Date(y, mo - 1, d, hh, mm, ss, 0);
    return isNaN(dt.getTime()) ? null : dt;
  }

  function formatLocal(dt) {
    const pad = (n, w=2) => String(n).padStart(w, '0');
    return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} `
         + `${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`
         + `.${pad(dt.getMilliseconds(), 3)}`;
  }

  function toDatetimeLocal(dt) {
    const pad = (n, w=2) => String(n).padStart(w, '0');
    return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`
         + `T${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`;
  }

  function computeTimes() {
    const rows = state.rows;
    const start = state.startTime;
    let offset = 0, prevTs = null;
    for (const r of rows) {
      if (r.ts === '' || r.ts == null) { r.elapsedSec = null; r.realTime = ''; continue; }
      const ts = parseFloat(r.ts);
      if (!isFinite(ts)) { r.elapsedSec = null; r.realTime = ''; continue; }
      if (prevTs !== null && ts + 50 < prevTs) offset += 100;
      prevTs = ts;
      r.elapsedSec = offset + ts;
      r.realTime = start ? formatLocal(new Date(start.getTime() + r.elapsedSec * 1000)) : '';
    }
  }

  function parseLog(text) {
    const lines = text.split(/\r?\n/);
    if (lines.length && lines[lines.length - 1] === '') lines.pop();
    const rows = [];
    for (let i = 0; i < lines.length; i++) {
      const ln = lines[i];
      const m = LINE_RE.exec(ln);
      let ts = '', dms = '', msg = '', type = 'INFO';
      if (m) { ts = m[1]; dms = m[2]; msg = m[3]; type = classify(msg); }
      else if (ln.startsWith('OVERRUN')) { type = 'INFO'; msg = ln; }
      else { msg = ln; type = 'INFO'; }
      const faultCode = (type === 'ERROR') ? findFaultCode(msg) : null;
      const signal = (type === 'INPUT' || type === 'OUTPUT') ? findSignal(msg) : null;
      rows.push({ n: i+1, ts, dms, type, msg, raw: ln, faultCode, signal });
    }
    return rows;
  }

  /* ---------------- definition file parsing ---------------- */
  async function parsePdfDefs(arrayBuffer, sourceName) {
    if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js not loaded');
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      let lastY = null, lineBuf = '';
      const out = [];
      for (const item of content.items) {
        const y = item.transform ? item.transform[5] : null;
        if (lastY !== null && y !== null && Math.abs(y - lastY) > 2) {
          out.push(lineBuf); lineBuf = '';
        }
        lineBuf += item.str;
        lastY = y;
      }
      if (lineBuf) out.push(lineBuf);
      fullText += out.join('\n') + '\n';
    }
    return parseFaultDefsText(fullText, sourceName);
  }

  function parseFaultDefsText(text, sourceName) {
    const cleaned = text.split(/\r?\n/).filter(ln => {
      const s = ln.trim();
      if (/^\d+\s*\/\s*\d+$/.test(s)) return false;
      if (s.startsWith('TK ELEVATOR CORPORATION')) return false;
      if (s.startsWith('Contact ITS')) return false;
      if (s.startsWith('Knowledge Article')) return false;
      if (s.startsWith('TKE Fault Codes')) return false;
      if (s.startsWith('Products:')) return false;
      if (s.toLowerCase().includes('manuals yet to be updated')) return false;
      if (s.startsWith('If further details are needed')) return false;
      if (s.includes('cid:')) return false;
      return true;
    }).join('\n');

    const out = {};
    const re = /^\s*(?:Fault|Error)\s+(\d{3,5})\s*:\s*/gim;
    const marks = [];
    let m;
    while ((m = re.exec(cleaned)) !== null) {
      marks.push({ code: m[1], start: m.index, headerEnd: m.index + m[0].length });
    }
    for (let i = 0; i < marks.length; i++) {
      const cur = marks[i];
      const nextStart = (i+1 < marks.length) ? marks[i+1].start : cleaned.length;
      const body = cleaned.slice(cur.headerEnd, nextStart);
      let flat = body.replace(/\s*\n\s*/g, ' ').replace(/\s+/g, ' ').trim();
      flat = flat.replace(/\s*If further details.*$/i, '')
                 .replace(/\s*contact ITS at.*$/i, '');
      const mm = flat.match(/^(.+?\.)\s+(.*)$/);
      const title = mm ? mm[1].trim() : flat;
      const detail = mm ? mm[2].trim() : '';
      out[cur.code] = { title, detail, source: sourceName };
    }
    return out;
  }

  // Parse a signal-definition text file (NAME\tDESCRIPTION or NAME  <2+ spaces>  DESCRIPTION)
  function parseSigDefsText(text, sourceName) {
    const out = {};
    for (const rawLn of text.split(/\r?\n/)) {
      const ln = rawLn.replace(/^\uFEFF/, '').trimEnd();
      if (!ln.trim()) continue;
      // split on tab first, fall back to 2+ spaces
      let parts;
      if (ln.includes('\t')) parts = ln.split('\t');
      else parts = ln.split(/\s{2,}/);
      if (parts.length < 2) continue;
      const name = parts[0].trim();
      const desc = parts.slice(1).join(' ').trim().replace(/^"|"$/g, '').trim();
      if (!name || !/^[A-Z][A-Z0-9_]{0,15}$/.test(name)) continue;
      if (!desc) continue;
      out[name] = { desc, source: sourceName };
    }
    return out;
  }

  // Heuristic: classify a text file as 'log', 'fault-defs', 'sig-defs'.
  function sniffTextKind(text) {
    const lines = text.split(/\r?\n/).slice(0, 200).filter(l => l.trim());
    if (!lines.length) return 'log';
    let logLike = 0, faultLike = 0, sigLike = 0;
    for (const ln of lines) {
      if (/^\d+(?:\.\d+)?\(\d+(?:\.\d+)?\):/.test(ln)) logLike++;
      else if (/^\s*(?:Fault|Error)\s+\d{3,5}\s*:/i.test(ln)) faultLike++;
      else if (/^[A-Z][A-Z0-9_]{0,15}\s*(?:\t|\s{2,})\s*[A-Z0-9]/.test(ln)) sigLike++;
    }
    if (logLike >= 5) return 'log';
    if (faultLike >= 3) return 'fault-defs';
    if (sigLike >= 10) return 'sig-defs';
    return 'log';
  }

  function mergeFaultDefs(newDefs, source) {
    let added = 0, replaced = 0;
    for (const [code, def] of Object.entries(newDefs)) {
      if (state.defs[code]) replaced++; else added++;
      state.defs[code] = def;
    }
    state.defSources.add(source);
    updateDefsBadge();
    if (state.rows.length) {
      for (const r of state.rows) if (r.type === 'ERROR' && !r.faultCode) r.faultCode = findFaultCode(r.msg);
    }
    return { added, replaced };
  }

  function mergeSigDefs(newDefs, source) {
    let added = 0, replaced = 0;
    for (const [name, def] of Object.entries(newDefs)) {
      if (state.sigDefs[name]) replaced++; else added++;
      state.sigDefs[name] = def;
    }
    state.defSources.add(source);
    updateDefsBadge();
    return { added, replaced };
  }

  /* ---------------- rendering ---------------- */
  function render() {
    const kw = state.keyword.trim().toLowerCase();
    const kwRE = kw ? new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi') : null;
    const active = state.activeTypes;

    const table = document.createElement('table');
    table.className = 'log-table';
    table.innerHTML = `
      <colgroup>
        <col class="c-num"><col class="c-ts"><col class="c-real"><col class="c-dms"><col class="c-type"><col>
      </colgroup>
      <thead><tr>
        <th>#</th><th>Timestamp</th><th>Real Time</th><th>Δms</th><th>Type</th><th>Message</th>
      </tr></thead>
    `;
    const tbody = document.createElement('tbody');
    table.appendChild(tbody);

    els.logContainer.innerHTML = '';
    els.logContainer.appendChild(table);
    els.logContainer.classList.add('active');
    els.dropZone.style.display = 'none';

    const rows = state.rows;
    let shown = 0, i = 0;
    const CHUNK = 3000;

    function pump() {
      const end = Math.min(i + CHUNK, rows.length);
      const frag = document.createDocumentFragment();
      for (; i < end; i++) {
        const r = rows[i];
        if (!active.has(r.type)) continue;
        if (kw && r.msg.toLowerCase().indexOf(kw) === -1) continue;

        const tr = document.createElement('tr');
        const hasFaultDef = r.faultCode && state.defs[r.faultCode];
        const hasSigDef   = r.signal    && state.sigDefs[r.signal];
        const hasDef = hasFaultDef || hasSigDef;
        tr.className = 'log-row row-' + r.type + (hasDef ? ' has-def' : '');
        tr.dataset.idx = i;
        if (hasFaultDef) tr.dataset.fault = r.faultCode;
        if (hasSigDef)   tr.dataset.signal = r.signal;

        let msgHtml = escapeHtml(r.msg);
        if (kwRE) msgHtml = msgHtml.replace(kwRE, m => '<span class="mark">' + m + '</span>');

        tr.innerHTML = `
          <td class="c-num">${r.n}</td>
          <td class="c-ts">${escapeHtml(r.ts)}</td>
          <td class="c-real">${escapeHtml(r.realTime || '')}</td>
          <td class="c-dms">${escapeHtml(r.dms)}</td>
          <td class="c-type">${r.type}</td>
          <td class="c-msg">${msgHtml}</td>
        `;
        frag.appendChild(tr);
        shown++;
      }
      tbody.appendChild(frag);
      if (i < rows.length) {
        setStatus(`Rendering… ${i.toLocaleString()} / ${rows.length.toLocaleString()} lines`);
        requestAnimationFrame(pump);
      } else {
        const f = state.faults.length;
        const nf = Object.keys(state.defs).length;
        const ns = Object.keys(state.sigDefs).length;
        setStatus(`${state.fileName}  ·  ${rows.length.toLocaleString()} lines  ·  ${shown.toLocaleString()} shown  ·  ${f} fault${f===1?'':'s'}  ·  defs: ${nf} fault, ${ns} I/O`);
      }
    }
    pump();
  }

  function renderFaults() {
    const list = els.faultList;
    list.innerHTML = '';
    state.faults = state.rows.reduce((a, r, i) => (r.type === 'ERROR' ? (a.push(i), a) : a), []);
    const faults = state.faults;
    els.faultHeader.textContent = `FAULT CODES (${faults.length})`;
    if (!faults.length) {
      list.innerHTML = '<div class="fault-empty">No fault codes detected in this log.</div>';
      return;
    }
    faults.forEach((idx, i) => {
      const r = state.rows[idx];
      const div = document.createElement('div');
      div.className = 'fault-item';
      div.tabIndex = 0;
      div.dataset.idx = idx;
      if (r.faultCode) div.dataset.fault = r.faultCode;
      const stamp = r.realTime
        ? `${escapeHtml(r.realTime)} <span style="opacity:.7">(@ ${escapeHtml(r.ts || '—')}s)</span>`
        : `@ ${escapeHtml(r.ts || '—')}s`;
      const def = r.faultCode ? state.defs[r.faultCode] : null;
      const codeBadge = r.faultCode ? `<span style="color:#ff9a9a;font-weight:600">[${r.faultCode}]</span> ` : '';
      const titleLine = def ? `<div class="msg" style="opacity:.85">${codeBadge}${escapeHtml(def.title)}</div>` : '';
      div.innerHTML = `
        <div class="num-ts"><span class="n">#${i + 1}</span>${stamp}</div>
        <div class="msg">${escapeHtml(r.msg)}</div>
        ${titleLine}
      `;
      const jump = () => jumpToRow(idx);
      div.addEventListener('dblclick', jump);
      div.addEventListener('click', jump);
      div.addEventListener('keydown', e => { if (e.key === 'Enter') jump(); });
      list.appendChild(div);
    });
  }

  function jumpToRow(idx) {
    const r = state.rows[idx];
    if (!state.activeTypes.has(r.type)) {
      state.activeTypes.add(r.type);
      document.querySelector(`#filters input[data-type="${r.type}"]`).checked = true;
      render();
      requestAnimationFrame(() => scrollToRow(idx));
    } else scrollToRow(idx);
  }

  function scrollToRow(idx) {
    const tr = els.logContainer.querySelector(`tr[data-idx="${idx}"]`);
    if (!tr) return;
    els.logContainer.querySelectorAll('tr.hit').forEach(x => x.classList.remove('hit'));
    void tr.offsetWidth;
    tr.classList.add('hit');
    tr.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }

  /* ---------------- tooltips ---------------- */
  function showFaultTooltip(code, x, y) {
    const d = state.defs[code];
    if (!d) return;
    const src = d.source ? `<div style="color:var(--muted);font-size:10px;margin-top:6px">from: ${escapeHtml(d.source)}</div>` : '';
    els.tooltip.innerHTML =
      `<div class="tt-code">Fault ${escapeHtml(code)}</div>` +
      `<div class="tt-title">${escapeHtml(d.title || '')}</div>` +
      (d.detail ? `<div class="tt-detail">${escapeHtml(d.detail)}</div>` : '') +
      src;
    els.tooltip.style.display = 'block';
    positionTooltip(x, y);
  }
  function showSigTooltip(name, x, y, isOutput) {
    const d = state.sigDefs[name];
    if (!d) return;
    const src = d.source ? `<div style="color:var(--muted);font-size:10px;margin-top:6px">from: ${escapeHtml(d.source)}</div>` : '';
    const kind = isOutput ? 'Output signal' : 'Input signal';
    els.tooltip.innerHTML =
      `<div class="tt-code" style="color:#9fd9ff">${escapeHtml(kind)}: ${escapeHtml(name)}</div>` +
      `<div class="tt-title">${escapeHtml(d.desc || '')}</div>` +
      src;
    els.tooltip.style.display = 'block';
    positionTooltip(x, y);
  }
  function hideTooltip() { els.tooltip.style.display = 'none'; }
  function positionTooltip(x, y) {
    const t = els.tooltip, pad = 14;
    const w = t.offsetWidth, h = t.offsetHeight;
    let nx = x + pad, ny = y + pad;
    if (nx + w > window.innerWidth - 4)  nx = x - w - pad;
    if (ny + h > window.innerHeight - 4) ny = y - h - pad;
    t.style.left = Math.max(4, nx) + 'px';
    t.style.top  = Math.max(4, ny) + 'px';
  }

  document.addEventListener('mouseover', e => {
    const row = e.target.closest('tr.log-row[data-fault], tr.log-row[data-signal], .fault-item[data-fault]');
    if (!row) return;
    if (row.dataset.fault)  return showFaultTooltip(row.dataset.fault, e.clientX, e.clientY);
    if (row.dataset.signal) {
      const isOutput = row.classList.contains('row-OUTPUT');
      return showSigTooltip(row.dataset.signal, e.clientX, e.clientY, isOutput);
    }
  });
  document.addEventListener('mousemove', e => {
    if (els.tooltip.style.display !== 'block') return;
    positionTooltip(e.clientX, e.clientY);
  });
  document.addEventListener('mouseout', e => {
    const row = e.target.closest('tr.log-row[data-fault], tr.log-row[data-signal], .fault-item[data-fault]');
    if (!row) return;
    if (!row.contains(e.relatedTarget)) hideTooltip();
  });

  /* ---------------- file handling ---------------- */
  function classifyFileByExt(file) {
    const n = (file.name || '').toLowerCase();
    if (n.endsWith('.pdf'))  return 'def-pdf';
    if (n.endsWith('.json')) return 'def-json';
    if (n.endsWith('.zlib') || n.endsWith('.gz')) return 'log';
    if (n.endsWith('.txt') || n.endsWith('.log')) return 'text'; // needs sniffing
    if ((file.type || '').includes('pdf'))  return 'def-pdf';
    if ((file.type || '').includes('json')) return 'def-json';
    return 'text';
  }

  function _readOnce(file, as) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload  = () => resolve(fr.result);
      fr.onerror = () => reject(fr.error || new Error('Read error'));
      fr.onabort = () => reject(new Error('Read aborted'));
      try {
        if (as === 'buffer') fr.readAsArrayBuffer(file);
        else fr.readAsText(file);
      } catch (ex) { reject(ex); }
    });
  }

  function decodeBuffer(buf) {
    const bytes = new Uint8Array(buf);
    // UTF-8 first (with BOM handling); fall back to latin-1 which always succeeds.
    try { return new TextDecoder('utf-8', { fatal: false }).decode(bytes); }
    catch (_) {}
    return new TextDecoder('latin1').decode(bytes);
  }

  // Modern browser path: the Blob itself has .text() / .arrayBuffer() which are
  // often more forgiving than FileReader, and don't require File-ness.
  async function readFileAs(file, as) {
    if (!file) throw new Error('No file');
    if (file.size === 0 && !file.type) {
      throw new Error(
        `Cannot read "${file.name}": looks like a folder or empty file. ` +
        `Drag the file itself, not the folder that contains it.`);
    }
    const describe = err => {
      const e = err || {};
      let msg = e.message || e.name || 'unknown';
      if (e.name === 'NotFoundError')
        msg = 'file was moved or deleted after the drop';
      else if (e.name === 'NotReadableError')
        msg = 'file is locked, cloud-only (OneDrive/Google Drive/iCloud), or access was denied — try opening the folder and making sure the file is downloaded locally';
      else if (e.name === 'SecurityError')
        msg = 'browser security blocked reading this file';
      return `Read error on "${file.name}" (${file.size.toLocaleString()} B): ${msg}`;
    };

    // Try Blob methods first, then FileReader, then (for text) a buffer-decode fallback.
    const attempts = (as === 'buffer')
      ? [ () => file.arrayBuffer(),
          () => _readOnce(file, 'buffer') ]
      : [ () => file.text(),
          () => _readOnce(file, 'text'),
          async () => {
            const buf = await (file.arrayBuffer
              ? file.arrayBuffer()
              : _readOnce(file, 'buffer'));
            return decodeBuffer(buf);
          } ];

    let lastErr = null;
    for (const attempt of attempts) {
      try { return await attempt(); }
      catch (e) { lastErr = e; }
    }
    throw new Error(describe(lastErr));
  }

  async function handleLogFile(file) {
    setStatus(`Reading log ${file.name} (${file.size.toLocaleString()} B)…`);
    const buf = await readFileAs(file, 'buffer');
    setStatus('Decompressing…');
    const { text, method } = tryDecompress(buf);
    setStatus('Parsing log…');
    state.rows = parseLog(text);
    state.fileName = `${file.name} (${method})`;
    const inferred = parseDateFromFilename(file.name);
    if (inferred) { state.startTime = inferred; els.startTime.value = toDatetimeLocal(inferred); }
    computeTimes();
    renderFaults();
    render();
  }

  async function handleTextFile(file) {
    const txt = await readFileAs(file, 'text');
    const kind = sniffTextKind(txt);
    if (kind === 'log') {
      // decompressing a plain text "log" — just reparse directly
      setStatus(`Parsing log ${file.name}…`);
      state.rows = parseLog(txt);
      state.fileName = `${file.name} (plain text)`;
      const inferred = parseDateFromFilename(file.name);
      if (inferred) { state.startTime = inferred; els.startTime.value = toDatetimeLocal(inferred); }
      computeTimes();
      renderFaults();
      render();
    } else if (kind === 'fault-defs') {
      const defs = parseFaultDefsText(txt, file.name);
      if (!Object.keys(defs).length) { setStatus(`No fault defs found in ${file.name}.`); return; }
      const { added, replaced } = mergeFaultDefs(defs, file.name);
      setStatus(`Fault defs loaded from ${file.name}: +${added} new, ${replaced} overrides. Total faults: ${Object.keys(state.defs).length}`);
      if (state.rows.length) { renderFaults(); render(); }
    } else if (kind === 'sig-defs') {
      const defs = parseSigDefsText(txt, file.name);
      if (!Object.keys(defs).length) { setStatus(`No I/O signal defs found in ${file.name}.`); return; }
      const { added, replaced } = mergeSigDefs(defs, file.name);
      setStatus(`I/O defs loaded from ${file.name}: +${added} new, ${replaced} overrides. Total I/O: ${Object.keys(state.sigDefs).length}`);
      if (state.rows.length) render();
    }
  }

  async function handleDefFile(file) {
    const kind = classifyFileByExt(file);
    setStatus(`Loading definitions: ${file.name}…`);
    try {
      if (kind === 'def-pdf') {
        const buf = await readFileAs(file, 'buffer');
        const defs = await parsePdfDefs(buf, file.name);
        if (!Object.keys(defs).length) { setStatus(`No fault defs found in ${file.name}.`); return; }
        const { added, replaced } = mergeFaultDefs(defs, file.name);
        setStatus(`Fault defs from ${file.name}: +${added} new, ${replaced} overrides.`);
      } else if (kind === 'def-json') {
        const txt = await readFileAs(file, 'text');
        const obj = JSON.parse(txt);
        // Decide: numeric keys -> fault defs; alpha keys -> sig defs
        const keys = Object.keys(obj);
        const numeric = keys.filter(k => /^\d{3,5}$/.test(k)).length;
        const alpha   = keys.filter(k => /^[A-Z][A-Z0-9_]{0,15}$/.test(k)).length;
        if (numeric >= alpha) {
          const defs = {};
          for (const [k, v] of Object.entries(obj)) defs[String(k)] = {
            title: v.title || v.name || '', detail: v.detail || v.description || '', source: file.name,
          };
          const { added, replaced } = mergeFaultDefs(defs, file.name);
          setStatus(`Fault defs from ${file.name}: +${added} new, ${replaced} overrides.`);
        } else {
          const defs = {};
          for (const [k, v] of Object.entries(obj)) defs[String(k)] = {
            desc: (typeof v === 'string') ? v : (v.desc || v.description || v.title || ''),
            source: file.name,
          };
          const { added, replaced } = mergeSigDefs(defs, file.name);
          setStatus(`I/O defs from ${file.name}: +${added} new, ${replaced} overrides.`);
        }
      }
      if (state.rows.length) { renderFaults(); render(); }
    } catch (err) { setStatus(`Error parsing ${file.name}: ${err.message}`); }
  }

  async function handleFiles(fileList) {
    if (!fileList || !fileList.length) return;
    const files = Array.from(fileList);
    const defFiles = [], textFiles = [], logFiles = [];
    for (const f of files) {
      const k = classifyFileByExt(f);
      if (k === 'def-pdf' || k === 'def-json') defFiles.push(f);
      else if (k === 'text') textFiles.push(f);   // resolved by content sniffing
      else logFiles.push(f);
    }
    // Load explicit def files first
    for (const f of defFiles) { try { await handleDefFile(f); } catch (e) { showFatal('Def error: ' + e.message); } }
    // Process text files (may be log or defs); load-once but track whether any become a log
    const textLogs = [];
    for (const f of textFiles) {
      try {
        const txt = await readFileAs(f, 'text');
        const kind = sniffTextKind(txt);
        if (kind === 'log') textLogs.push({ file: f, text: txt });
        else if (kind === 'fault-defs') {
          const defs = parseFaultDefsText(txt, f.name);
          const { added, replaced } = mergeFaultDefs(defs, f.name);
          setStatus(`Fault defs from ${f.name}: +${added} new, ${replaced} overrides.`);
        } else if (kind === 'sig-defs') {
          const defs = parseSigDefsText(txt, f.name);
          const { added, replaced } = mergeSigDefs(defs, f.name);
          setStatus(`I/O defs from ${f.name}: +${added} new, ${replaced} overrides.`);
        }
      } catch (e) { showFatal('File error: ' + e.message); }
    }
    // Parse all binary log files into rows
    for (const f of logFiles) {
      try {
        setStatus(`Reading ${f.name} (${f.size.toLocaleString()} B)…`);
        const buf = await readFileAs(f, 'buffer');
        const { text, method } = tryDecompress(buf);
        const rows = parseLog(text);
        const inferred = parseDateFromFilename(f.name);
        textLogs.push({ file: f, text: null, rows, method, inferred });
      } catch (e) { showFatal('Log error: ' + e.message); }
    }

    // Merge all log sources
    if (textLogs.length) {
      // Resolve inferred time for each entry, then sort files chronologically by filename date
      for (const entry of textLogs) {
        if (entry.inferred === undefined) entry.inferred = parseDateFromFilename(entry.file.name);
      }
      textLogs.sort((a, b) => {
        if (a.inferred && b.inferred) return a.inferred - b.inferred;
        if (a.inferred) return -1;
        if (b.inferred) return 1;
        return 0;
      });

      const total = textLogs.length;
      setStatus(`Merging ${total} log file${total > 1 ? 's' : ''}…`);

      // Concatenate rows in file order (timestamps are relative per-file, not globally sortable)
      let allRows = [];
      const names = [];
      for (const entry of textLogs) {
        allRows = allRows.concat(entry.rows || parseLog(entry.text));
        names.push(entry.file.name);
      }

      const earliestTime = textLogs[0].inferred || null;
      state.rows = allRows;
      state.fileName = total === 1 ? names[0] : `${total} files: ${names.join(', ')}`;
      if (earliestTime) { state.startTime = earliestTime; els.startTime.value = toDatetimeLocal(earliestTime); }
      computeTimes();
      renderFaults();
      render();
    } else if (state.rows.length) {
      // loaded defs but no log change — still re-render to light up any matches
      renderFaults(); render();
    }
  }

  /* ---------------- events ---------------- */
  els.fileInput.addEventListener('change', e => handleFiles(e.target.files));

  ['dragenter', 'dragover'].forEach(ev =>
    els.dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); els.dropZone.classList.add('dragover'); })
  );
  ['dragleave', 'drop'].forEach(ev =>
    els.dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); els.dropZone.classList.remove('dragover'); })
  );
  els.dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer && e.dataTransfer.files));
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => {
    e.preventDefault();
    if (els.logContainer.classList.contains('active')) handleFiles(e.dataTransfer && e.dataTransfer.files);
  });

  els.filters.addEventListener('change', e => {
    if (e.target.matches('input[type="checkbox"]')) {
      const t = e.target.dataset.type;
      if (e.target.checked) state.activeTypes.add(t); else state.activeTypes.delete(t);
      if (state.rows.length) render();
    }
  });

  els.startTime.addEventListener('change', e => {
    const v = e.target.value;
    state.startTime = v ? new Date(v) : null;
    if (state.startTime && isNaN(state.startTime.getTime())) state.startTime = null;
    if (state.rows.length) { computeTimes(); render(); renderFaults(); }
  });

  let searchTimer;
  els.search.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.keyword = e.target.value;
      if (state.rows.length) render();
    }, 120);
  });

  els.clearBtn.addEventListener('click', () => {
    // Full reset: unload log and return to drop zone
    els.search.value = '';
    state.keyword = '';
    ['ERROR', 'INPUT', 'OUTPUT', 'INFO'].forEach(t => {
      state.activeTypes.add(t);
      const cb = document.querySelector(`#filters input[data-type="${t}"]`);
      if (cb) cb.checked = true;
    });
    state.rows = [];
    state.faults = [];
    state.fileName = '';
    els.logContainer.innerHTML = '';
    els.logContainer.classList.remove('active');
    els.dropZone.style.display = 'flex';
    renderFaults();
    setStatus('Ready. Waiting for file…');
    els.fileInput.value = '';
  });

  updateDefsBadge();
})();
</script>
</body>
</html>
