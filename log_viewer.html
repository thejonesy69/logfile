<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elevator Log Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #1d2330;
    --panel: #252c3c;
    --panel-2: #2f3647;
    --border: #3a4258;
    --text: #e6e8ee;
    --muted: #9aa3b8;
    --accent: #4a90e2;
    --accent-hover: #5aa1f2;

    /* row colors for types */
    --info-bg: #cfe2f7;
    --info-bg-alt: #c2d8f0;
    --input-bg: #f7e5b0;
    --input-bg-alt: #f0dea0;
    --output-bg: #b9e6be;
    --output-bg-alt: #aadbaf;
    --error-bg: #f5b5b5;
    --row-text: #1a1a1a;

    /* fault panel */
    --fault-bg: #2a2f3e;
    --fault-item: #3a1a1a;
    --fault-border: #a13a3a;
    --fault-accent: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  /* ---------- top toolbar ---------- */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  header .title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-right: 8px;
  }
  button, label.btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
  }
  button:hover, label.btn:hover { background: var(--accent-hover); }
  button:disabled { background: #556; cursor: not-allowed; }
  input[type="file"] { display: none; }

  .filters {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .filter {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
  }
  .filter input { margin: 0; cursor: pointer; accent-color: var(--accent); }
  .filter .swatch {
    width: 12px; height: 12px; border-radius: 2px;
    display: inline-block;
    border: 1px solid rgba(0,0,0,.2);
  }

  .start-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .start-wrap input[type="datetime-local"] {
    background: #1a1f2b;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    color-scheme: dark;
  }
  .start-wrap input[type="datetime-local"]:focus { border-color: var(--accent); }

  .search-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .search-wrap label { color: var(--muted); font-size: 12px; }
  .search-wrap input[type="text"] {
    background: #1a1f2b;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 3px;
    font-size: 12px;
    width: 220px;
    outline: none;
    font-family: inherit;
  }
  .search-wrap input[type="text"]:focus { border-color: var(--accent); }
  .clear-btn { background: #c0392b !important; }
  .clear-btn:hover { background: #d44332 !important; }

  /* ---------- main split layout ---------- */
  #main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  #fault-panel {
    width: 340px;
    background: var(--fault-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #fault-panel .fault-header {
    padding: 10px 12px;
    font-weight: 700;
    color: var(--fault-accent);
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.5px;
  }
  #fault-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .fault-item {
    background: var(--fault-item);
    border-left: 3px solid var(--fault-border);
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    border-radius: 2px;
    font-size: 12px;
    line-height: 1.4;
  }
  .fault-item:hover { background: #4a2020; }
  .fault-item .num-ts {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 2px;
  }
  .fault-item .num-ts .n { color: var(--fault-accent); font-weight: 600; margin-right: 6px; }
  .fault-item .msg {
    color: #ffd4d4;
    font-family: "Menlo", "Consolas", monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .fault-hint {
    padding: 8px 12px;
    color: var(--muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    font-style: italic;
    text-align: center;
  }
  .fault-empty {
    color: var(--muted);
    padding: 20px 12px;
    font-size: 12px;
    text-align: center;
    font-style: italic;
  }

  /* ---------- log view ---------- */
  #log-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #f5f6fa;
  }
  #drop-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #555;
    background: #f5f6fa;
  }
  #drop-zone.dragover { background: #e0ecff; }
  #drop-zone h2 { margin: 0 0 8px; color: #333; font-weight: 500; }
  #drop-zone p { margin: 4px 0; color: #666; }

  #log-container {
    flex: 1;
    overflow: auto;
    display: none;
    position: relative;
  }
  #log-container.active { display: block; }

  table.log-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-family: "Menlo", "Consolas", "Courier New", monospace;
    font-size: 12px;
    color: var(--row-text);
  }
  table.log-table thead th {
    background: #3a4258;
    color: #fff;
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 2;
    border-right: 1px solid #2c334a;
    font-family: inherit;
    font-size: 12px;
  }
  table.log-table thead th:last-child { border-right: none; }
  table.log-table td {
    padding: 3px 10px;
    vertical-align: top;
    white-space: pre-wrap;
    word-break: break-word;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  /* col widths */
  col.c-num { width: 60px; }
  col.c-ts  { width: 90px; }
  col.c-real { width: 165px; }
  col.c-dms { width: 60px; }
  col.c-type { width: 78px; }

  td.c-num, td.c-ts, td.c-real, td.c-dms, td.c-type { text-align: left; }
  td.c-num { text-align: right; color: #555; }
  td.c-real { color: #222; font-weight: 500; }

  tr.row-INFO   { background: var(--info-bg); }
  tr.row-INFO:nth-child(even)   { background: var(--info-bg-alt); }
  tr.row-INPUT  { background: var(--input-bg); }
  tr.row-INPUT:nth-child(even)  { background: var(--input-bg-alt); }
  tr.row-OUTPUT { background: var(--output-bg); }
  tr.row-OUTPUT:nth-child(even) { background: var(--output-bg-alt); }
  tr.row-ERROR  { background: var(--error-bg); font-weight: 600; }
  /* jump-to-fault highlight: bold outline, glow, bright yellow background, brief pulse */
  tr.log-row.hit td {
    background: #ffe66a !important;
    color: #000 !important;
    font-weight: 700;
  }
  tr.log-row.hit {
    outline: 3px solid #ff6b00;
    outline-offset: -3px;
    box-shadow: 0 0 0 3px rgba(255,107,0,0.35), 0 0 18px 4px rgba(255,107,0,0.55);
    animation: hitPulse 1.2s ease-out 3;
    position: relative;
    z-index: 3;
  }
  tr.log-row.hit td.c-num {
    background: #ff6b00 !important;
    color: #fff !important;
  }
  tr.log-row.hit td.c-num::before {
    content: "▶ ";
    color: #fff;
  }
  @keyframes hitPulse {
    0%   { box-shadow: 0 0 0 3px rgba(255,107,0,0.35), 0 0 18px 4px rgba(255,107,0,0.55); }
    50%  { box-shadow: 0 0 0 6px rgba(255,107,0,0.55), 0 0 26px 8px rgba(255,107,0,0.80); }
    100% { box-shadow: 0 0 0 3px rgba(255,107,0,0.35), 0 0 18px 4px rgba(255,107,0,0.55); }
  }

  /* highlight keyword match in message */
  .mark { background: #ffd54a; padding: 0 1px; border-radius: 1px; }

  /* ---------- status bar ---------- */
  #status {
    padding: 6px 12px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: "Menlo", "Consolas", monospace;
    flex-shrink: 0;
  }

  .error-box {
    color: #8b1c1c;
    padding: 20px;
    background: #ffd4d4;
    border-left: 3px solid #c0392b;
    margin: 20px;
    font-family: monospace;
    white-space: pre-wrap;
  }

  /* ---------- fault tooltip ---------- */
  #tooltip {
    position: fixed;
    max-width: 480px;
    background: #1a1f2b;
    color: #e6e8ee;
    border: 1px solid var(--fault-accent);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 1000;
    display: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #tooltip .tt-code {
    color: var(--fault-accent);
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 4px;
  }
  #tooltip .tt-title {
    color: #ffe8e8;
    font-weight: 600;
    margin-bottom: 6px;
  }
  #tooltip .tt-detail {
    color: #cdd5e3;
    white-space: pre-wrap;
  }
  /* clickable hint on rows that have a matching definition */
  tr.log-row.has-def td.c-msg { cursor: help; border-bottom: 1px dotted #b03a3a; }

  .defs-badge {
    color: var(--muted);
    font-size: 11px;
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
    background: #1a1f2b;
  }
  .defs-badge b { color: var(--accent); }
</style>
</head>
<body>

<header>
  <span class="title">Elevator Log Viewer</span>
  <label class="btn" for="file-input">Open Files</label>
  <input type="file" id="file-input" accept=".zlib,.txt,.log,.gz,.pdf,.json,*/*" multiple>
  <span class="defs-badge" id="defs-badge">Defs: <b id="defs-count">0</b></span>

  <div class="filters" id="filters">
    <label class="filter"><input type="checkbox" data-type="ERROR"  checked><span class="swatch" style="background:var(--error-bg)"></span>System Errors</label>
    <label class="filter"><input type="checkbox" data-type="INPUT"  checked><span class="swatch" style="background:var(--input-bg)"></span>Input Signals</label>
    <label class="filter"><input type="checkbox" data-type="OUTPUT" checked><span class="swatch" style="background:var(--output-bg)"></span>Output Signals</label>
    <label class="filter"><input type="checkbox" data-type="INFO"   checked><span class="swatch" style="background:var(--info-bg)"></span>General</label>
  </div>

  <div class="start-wrap">
    <label for="start-time">Log start:</label>
    <input type="datetime-local" id="start-time" step="1">
  </div>

  <div class="search-wrap">
    <label for="search">Keyword:</label>
    <input type="text" id="search" placeholder="filter messages…">
    <button class="clear-btn" id="clear-btn">✕ Clear</button>
  </div>
</header>

<div id="main">
  <aside id="fault-panel">
    <div class="fault-header" id="fault-header">FAULT CODES (0)</div>
    <div id="fault-list">
      <div class="fault-empty">No file loaded.</div>
    </div>
    <div class="fault-hint">Double-click or Enter to jump to fault</div>
  </aside>

  <div id="log-wrap">
    <div id="drop-zone">
      <div>
        <h2>Drop files here</h2>
        <p>Logs: <code>.zlib</code> compressed or plain <code>.txt</code></p>
        <p><small>You can drop multiple files at once. Or click "Open Files" above.</small></p>
      </div>
    </div>
    <div id="log-container"></div>
  </div>
</div>

<div id="status">Ready. Waiting for file…</div>
<div id="tooltip"></div>

<script>
(function () {
  /* ---------------- built-in definitions ---------------- */
  const DEFAULT_FAULT_DEFS = {"612": {"detail": "[Inverter/NON-RESETTABLE] Trigger: Continuously Causes: Defective DCA Card. (Green Drive Manual, p71)", "title": "EEPROM_INV_FAULT — EEPROM Fault; Inverter Unsuccessful attempt to write inverter EEPROM"}, "618": {"detail": "[Rectifier/RESETTABLE] Trigger: • Normal brake current dictation zero. • Normal brake current measured = zero. • Duty cycle = maximum for 50msec. Normal brake current dictation appx. zero. Causes: • Loose/open brake circuit wiring. Check BRK+ and BRKwiring; locations of bad wiring dependent on system configuration include: brake terminal box, machine interface box, controller din rail terminals, and/or Green Drive BCA PCB CON2 (depending on system configuration). • BCA fuse F1 is open. • BCA fuse F2 is open. • BCA or SSOA IGBT failed open. • Verify that the BCA card has proper AC voltage input at CON3 for application. (Green Drive Manual, p71)", "title": "OPEN_CKT_MB — Open Circuit; Normal Brake"}, "619": {"detail": "[Rectifier/RESETTABLE] Trigger: • Emergency brake current dictation zero. • Emergency brake current measured = zero. • Duty cycle = maximum for 50msec. Emergency brake current dictation appx. zero. Causes: • Loose/open brake circuit wiring. Check EBRK+ and EBRKwiring; locations of bad wiring dependent on system configuration include: brake terminal box, machine interface box, controller din rail terminals, and/or Green Drive BCA PCB CON2 (depending on system configuration). • Secondary fault occurs due to stopped operation caused by another fault, e.g., 626, 715, or 822 (check troubleshooting tips for these faults first) or emergency stops initiated by the Safety Processor. • BCA fuse F1 is open. • BCA fuse F2 is open. • BCA IGBT failed open. • Fuse(s) F-BK1 (or F-BK2 or F-BK3) is open. • Verify that the BCA Card has proper AC voltage input at CON3 for application. (Green Drive Manual, p71)", "title": "OPEN_CKT_EB — Open Circuit; Emergency Brake"}, "621": {"detail": "[Inverter/RESETS UPON] Causes: • Invalid software loaded into DCA Rectifier Processor or Inverter Processor may cause this. Load correct DCA software for RP and IP. • Shorted Inverter CAN bus (Internal CAN bus); With drive powered down, check resistance from ICH to ICL on DCA (CON6 pin 23 and pin 24). Reading should be 60 ohms. If it is zero ohms, remove DCA and check again. If reading is still zero, card is defective and needs replacement. • Update inverter and rectifier to V2R5 or later software. (Green Drive Manual, p72)", "title": "SERIAL_COMM_FAULT (COM_FLT_INV_RECT) — Com Fault; Green Drive; Inverter/Rectifier Fault is triggered if the Rectifier Processor has not received a specific CAN message from the Inverter Processor for 2 seconds. • Message rate is every 240 msec if no changes to information in message. • Message sent "}, "622": {"detail": "[Inverter/NOTIFY] Causes: • Inverter firmware was updated and additional parameters added caused default parameters to be loaded on power up. • Corrupted EEPROM write; parameters will be reset to default. • Check all drive parameters and verify against the job specifications. (Green Drive Manual, p72)", "title": "EEPROM_DATA_RESET — EEPROM Invalid Checksum Invalid EEPROM checksum detected."}, "624": {"detail": "[Inverter/RESETTABLE] Trigger: commanded. Causes: • Loose BRKC and/or EBC1 wiring between the controller and the DCA Card. • Emergency stop initiated by the controller (controller removed BRKC, EBC1, CPU brake CAN dictations, and/or SP brake enabled CAN messages); investigate causes of the emergency stop. • Emergency stop initiated by the drive (particularly the rectifier, e.g., 675 Fault). Investigate causes of the emergency stop. (Green Drive Manual, p72)", "title": "BRK_DROP_FLT — Brake Drop Fault • Set Motor Torque Command = zero because brake current = zero. • Dictated speed > releveling. • A run is in progress. • CAN current dictation for emergency or normal brake = 0."}, "625": {"detail": "[Rectifier/NOTIFY] Trigger: • Normal brake current dictation zero. • Duty cycle = minimum. • Normal brake current measured >= 0.1 amps for 2.5 sec. Normal brake current dictation appx. zero. Causes: Defective BCA Card. Note: Before changing card, see BCA card troubleshooting procedures. (Green Drive Manual, p72)", "title": "SHORT_PWM_MB — Shorted PWM IGBT; Normal Brake."}, "626": {"detail": "[Rectifier/NOTIFY] Trigger: • Emergency brake current dictation zero. • Duty cycle = minimum. • Emergency brake current measured >= 0.1 amps for 2.5 sec. Normal brake current dictation appx. zero. Causes: Defective BCA Card. Note: Before changing card, see BCA card troubleshooting procedures. (Green Drive Manual, p72)", "title": "SHORT_PWM_EB — Shorted PWM IGBT; Emergency Brake."}, "627": {"detail": "[Inverter/RESETTABLE] Trigger: Run bit active, regulator test complete, and IGBTs are switching. Causes: • Loose motor wiring. • Grounded or shorted drive output/motor circuit. • Mechanical component binding. • Brake not picking properly. • Excessive load placed on the elevator. • Incorrect counterweighting. • Internal drive failure. • Kp_Vs gain is too high. • Encoder not properly aligned; verify/repeat encoder alignment procedure. • Incorrect drive adjustment, e.g., incorrect field current/slip frequency on induction installations. • Check encoder & encoder harness; replace if needed. • Review the parameters. (Green Drive Manual, p73)", "title": "OVC_FLT — Over Current, Instantaneous, Inverter. Instantaneous inverter phase current (any phase) measured to be >= (Inom x1.414 x 2.3). • 400E and 400F: 261A • 400C: 130A • 200D: 261A • 200C: 130A Notes: • 3 consecutive samples (at PWM cycle rate) are required to trip the protection. • Overcurrent "}, "629": {"detail": "[Inverter/Rectifier/RESETTABLE] Causes: • The input 3 phase voltage is above allowed tolerance. • Building supply cannot absorb regenerated load (possible during emergency power or building construction) due to insufficient connective load. • Verify three phase voltage is not exceeding allowed tolerance when running in regen mode. • For regen disable applications, could be a defective external dynamic braking unit and/or resistor assembly. • Emergency stop can cause this fault (look into causes of other thrown faults). • Rectifier bus voltage regulation gains Ki_Volt_R and Kp_Volt_R are too low. (Green Drive Manual, p73)", "title": "BUS_FLT — Over Voltage, DC BUS. DC Bus voltage measured to be higher than defined trigger value of: • Class 200: 428Vdc. • Class 400: 838Vdc. System state for error activation: Continuous after initialization."}, "636": {"detail": "[Inverter/NON-RESETTABLE] Trigger: Prior to a movement and at end of run. Causes: Defective SSOA Card. (Green Drive Manual, p73)", "title": "SSOA_TEST_FLT — Safe Torque Off Test. • Start-of-Run Test: SSOA gates enabled, expect SQOR output pulses, no SQOR counts detected, interval = 1msec. • End-of-Run Test: SSOA gates disabled, expect no SQOR output pulses, SQOR counts detected, interval = 1msec."}, "637": {"detail": "[Inverter/NON-RESETTABLE] Causes: • Excessive load placed on the elevator. • Incorrect counterweighting. • Mechanical component binding. • Review the parameters, specifically the Motor Nameplate values in the Adjust Menu. (Green Drive Manual, p74)", "title": "RMS_FLT — Over Current, RMS, Motor. Measured inverter torque current exceeds Class 20 motor time-current overload curve; see graph below."}, "643": {"detail": "[Inverter/Rectifier/RESETTABLE] Trigger: Continuous after initialization. Causes: • Low building supply voltage. • Rectifier bus voltage regulation gains Ki_Volt_R and Kp_Volt_R are too low. • Internal drive failure. • Verify Drive In Rated Volts matches main line voltage (208,240, or 480). Note: Setting to 240 with a 208 mainline will cause this error. (Green Drive Manual, p74)", "title": "UV_FLT — Under Voltage, DC BUS. Bus voltage measured to be lower than defined trigger value of: • 208V input voltage: 231Vdc. • 240V input voltage: 265Vdc. • 480V input voltage: 529Vdc."}, "644": {"detail": "[Rectifier/RESETTABLE] Trigger: Active when run commanded. Causes: • See 627. • Rectifier current regulator gain Kp_Curr_R could be too high. • Emergency stop can cause this fault, particularly if stopped when motoring (look into causes of other thrown faults). • Input phase loss during a run. (Green Drive Manual, p74)", "title": "INST_OVC_R — Over Current, Instantaneous, Rectifier. Instantaneous rectifier phase current (any phase) measured to be >= the following values. • 400E and 400F: 268A. • 400C: 134A. • 200D: 239A. • 200C: 119A. Notes: • 3 consecutive samples (at PWM cycle rate) are required to trip the protection. • Ov"}, "657": {"detail": "[Rectifier/RESETTABLE] Trigger: Active when DBU operation is enabled Causes: • Loose or open signal wiring (DBUEN, DBUFLT, G24, AC1, AC2) between braking unit and controller/drive. • Loose or open power wiring between braking unit and braking resistors. • Over temperature in braking resistor assembly. • DBU fault, such as shorted chopper IGBT. (Green Drive Manual, p74)", "title": "DBU_NOT_READY — Dynamic Brake Unit (DBU) Not Ready. Ready signal not asserted by the external DBU."}, "663": {"detail": "[Inverter/NON-RESETTABLE] Trigger: Active when run commanded. Causes: • Incremental (VEA+/VEA-, VEB+/VEB-) encoder signals reversed. • Absolute encoder not in alignment, re-align the Absolute Encoder with either a balance load or with suspension removed from the drive sheave. • Brake not picking properly. • Mechanical component binding. • Incorrect counterweighting. • Excessive load placed on the elevator. • Verify correct phasing at the U, V, and W output terminals of the drive, in relation to the motor windings. • Verify the Adjust Parameters are correct as indicated on the Motor Nameplate. • Inverter current regulator gain Kp_Vs is too low. • Acceleration/deceleration rates set too high. • Check for loose output wiring (U,V,W). • On motors with configurable windings, verify windings configured correctly for application voltage rating. (Green Drive Manual, p75)", "title": "XS_LIM_FLT — Torque Current Command Limit; Inverter. Torque Current Command • Automatic: Amplitude >= (Inom_motor x 1.414 x OLF) Note: OLF (overload factor) varies depending on drive size. 200/400: OLF = 2.15 • Inspection: Amplitude >= (Inom_motor x 1.414 x 1.84) Duration >= 0.5 second Note: Inom_mo"}, "665": {"detail": "[Inverter/RESETTABLE] Trigger: Active when run bit is enabled and speed dictation is zero. Causes: • Check the W phase wiring open circuit. • SSOA is blocking the inverter IGBT gating; verify the MCC1 signal is asserted by the controller. • The KP_VS parameter is too low. • Check connections between SSOA and DCA cards. • Bad connection between DCA card and PEA Interface card (50 pin connector). • Defective SSOA Card. • A defective current U or V sensor; replace the PEA Assembly. • A defective phase U or V triggering circuit; replace the PEA Assembly. (Green Drive Manual, p75)", "title": "W_PHASE_CONT — Current Regulator Failure, Phase W. For inverter phase W, error between current command and feedback >= 20%."}, "666": {"detail": "[Inverter/RESETTABLE] Trigger: Active when run bit is enabled and speed dictation is zero. Causes: • Check the V phase wiring open circuit. • SSOA is blocking inverter IGBT gating; verify MCC1 signal is asserted by the controller. • The KP_VS parameter is too low. • Check connections between SSOA and DCA cards. • Bad connection between DCA card and PEA Interface card (50 pin connector). • Defective SSOA Card. • A defective current V sensor; replace the PEA Assembly. • A defective phase V triggering circuit; replace the PEA Assembly. (Green Drive Manual, p75)", "title": "V_PHASE_CONT — Current Regulator Failure, Phase V. For inverter phase V, error between current command and feedback >= 20%."}, "667": {"detail": "[Inverter/RESETTABLE] Trigger: Active when run bit is enabled and speed dictation is zero. Causes: • Check the U Phase wiring open circuit. • SSOA is blocking inverter IGBT gating; verify MCC1 signal is asserted by the controller. • The KP_VS parameter is too low. • Check connections between SSOA and DCA cards. • Bad connection between DCA card and PEA Interface card (50 pin connector). • Defective SSOA Card. • A defective current U sensor; replace the PEA Assembly. • A defective phase U triggering circuit; replace the PEA Assembly. (Green Drive Manual, p75)", "title": "U_PHASE_CONT — Current Regulator Failure, Phase U. For inverter phase U, error between current command and feedback >= 20%."}, "668": {"detail": "[PEA/NON-RESETTABLE] Trigger: Detection when IGBT ON gate command is present. Causes: • Airflow blocked causing temperature rise at IGBT gate driver card internally; verify controller air intake filter/plenum not restricting airflow. • Mechanical component binding. • Grounded or shorted output / motor circuit. • The motor cables are in short circuit. • The PEA phase W IGBT is in short circuit; replace the PEA assembly. • Internal drive failure. (Green Drive Manual, p76)", "title": "OOSW_FLT — Short Circuit, Phase W, PEA. High current level (out-of-saturation) detected in W phase IGBT."}, "669": {"detail": "[PEA/NON-RESETTABLE] Trigger: Detection when IGBT ON gate command is present. Causes: • Airflow blocked causing temperature rise at IGBT gate driver card internally; verify controller air intake filter/plenum not restricting airflow. • Mechanical component binding. • Grounded or shorted output / motor circuit. • The motor cables are in short circuit. • The PEA phase V IGBT is in short circuit; replace the PEA assembly. • Internal drive failure. (Green Drive Manual, p76)", "title": "OOSV_FLT — Short Circuit, Phase V, PEA. High current level (out-of-saturation) detected in V phase IGBT."}, "670": {"detail": "[PEA/NON-RESETTABLE] Trigger: Detection when IGBT ON gate command is present. Causes: • Airflow blocked causing temperature rise at IGBT gate driver card internally; verify controller air intake filter/plenum not restricting airflow. • Mechanical component binding. • Grounded or shorted output / motor circuit. • The motor cables are in short circuit. • The PEA phase U IGBT is in short circuit; replace the PEA assembly. • Internal drive failure. (Green Drive Manual, p76)", "title": "OOSU_FLT — Short Circuit, Phase U, PEA. High current level (out-of-saturation) detected in U phase IGBT."}, "672": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: Continuously. Causes: • Loose/open connection between the drive and the input choke and/or incoming power; check these terminals: L1, L2, L3, A1, B1, C1, A2, B2, and C2. • Verify motor leads U, V, and W are not shorted to ground. (Green Drive Manual, p76)", "title": "PCHG_FLT — Precharge Fault. For 5 consecutive bus charge attempts, BCHG Command is asserted and PEA_Ready signal is not received within expected time period."}, "674": {"detail": "[Inverter/RESETTABLE] Trigger: Inverter IGBTs are switching, and Encoder Alignment not being performed. Causes: • KP_VS not adjusted properly. Use DAQ Trace 9 to verify gain is set properly. — If adjustment of KP_VS Gain does not eliminate fault, verify that the motor wiring is correct for the voltage rating of motor versus drive (e.g., 460-volt motor with 480volt drive; 208/230-volt motor with 230volt drive). — Operating on regen disable (in this mode, the drive does not boost DC bus); Adjust KP_VS Gain. • Verify the Adjust Parameters are correct as indicated on the Motor Nameplate. • Drive output power requirement is exceeding available input power to the drive. • Check for loose output wiring (U,V, W). • Bad incremental signal from encoder. Use DAQ to verify feedback velocity (wr) signal condition. • If Type 6 (PMAC), re-align the Absolute Encoder with either a balance load or with suspension removed from the drive sheave. • Emergency stop can cause this fault, particularly if stopped when motoring (look into causes of other thrown faults). (Green Drive Manual, p77)", "title": "CUR_REG_ERR — Current Regulator Failure, Inverter. For any inverter phase, error between current reference and current feedback >= (Inom_inv x 1.414 x 0.3) for more than 100 msec. Not active when on Inspection Operation. • 400E and 400F: 34A. • 400C: 17A. • 200D: 34A. • 200C: 17A."}, "675": {"detail": "[Rectifier/RESETTABLE] Trigger: Inverter IGBTs are switching, and Encoder Alignment not being performed. Causes: • Kp_Curr_R not adjusted properly. • Mis-wire between drive and input choke. • Input phase loss (L1, L2, L3). • Loose input L1, L2, L3 wiring. • Emergency stop can cause this fault, particularly if stopped when regenerating (look into causes of other thrown faults). • Verify drive terminals A2, B2, C2, B+, B-, U, V, and W, are not shorted to ground using a DVM. All terminals should measure greater than 1 megohm with reference to ground (Green Drive Manual, p77)", "title": "CUR_REG_ERR_R — Current Regulator Failure, Rectifier. For any rectifier phase, error between current reference and current feedback >= (Inom_inv x 1.414 x 0.3) for more than 100 msec. Not active when on Inspection Operation. • 400E and 400F: 34A. • 400C: 17A. • 200D: 34A. • 200C: 17A."}, "676": {"detail": "[Rectifier/NOTIFY] Trigger: Prior to start of run and at end of run. Causes: • Check brake settings against brake nameplate; controller brake transformer setup may be insufficient. • Check controller brake circuit fusing. • Secondary fault due to other faults, e.g., a shorted PWM IGBT in the brake circuit, troubleshoot other faults. • Improper adjustment of brake pick time. • BCA fuse F1 is open. • BCA fuse F2 is open. • Verify that the BCA card has proper AC voltage input at CON3. (Green Drive Manual, p77)", "title": "CUR_REG_ERR_MB — Current Regulator Failure, Normal Brake. BCA Card: Difference in normal brake current dictation and feedback >= 10% of BCA rating (0.6 amps) for duration = 1 sec."}, "677": {"detail": "[Rectifier/NOTIFY] Trigger: At end of run Causes: • Check brake settings against brake nameplate; controller brake transformer setup may be insufficient. • Check controller brake circuit fusing. • Secondary fault due to other faults, e.g., a shorted PWM IGBT in the brake circuit, troubleshoot other faults. • Improper adjustment of brake pick time. • BCA fuse F1 is open. • BCA fuse F2 is open. • Verify that the BCA card has proper AC voltage input at CON3 for application. • Improper adjustment of B46 (Emergency Brake drop time). • If Emergency Brake present, must be set to at least 2 seconds. (Green Drive Manual, p78)", "title": "CUR_REG_ERR_EB — Current Regulator Failure, Emergency Brake. BCA Card: Difference in emergency brake current dictation and feedback >= 10% of BCA rating (0.6 amps) for duration = 1 sec."}, "678": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: Prior to start of run. Causes: Defective BCA Card. Note: Before changing card, see BCA card troubleshooting procedures. (Green Drive Manual, p78)", "title": "DROP_FAIL_ERR_MB — Brake Drop IGBTs Test; Normal Brake. Start-of-Run normal brake test. • Normal brake current = 0 is expected. • Normal brake current > 0 is measured. • Test duration = 100 msec."}, "679": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: Prior to start of run and at end of run. Causes: Defective BCA Card. Note: Before changing card, see BCA card troubleshooting procedures. (Green Drive Manual, p78)", "title": "DROP_FAIL_ERR_EB — Brake Drop IGBTs Test; Emergency Brake (DCA _EBRK or EBC1). • End-of-run or start-of-run emergency brake tests. • Emergency brake current = zero is expected. • Emergency brake current > zero is measured. • Test duration = 100 msec."}, "681": {"detail": "[Inverter/RESETTABLE] Trigger: Prior to start of run. Causes: • No power to encoder. — Verify P24F to G24 at FWIA CON5-10 and CON5-11 voltage output is 24vdc. — Verify F3 fuse on FWIA card is good in case no P24F voltage. — Verify P24 to G24 input at CON1-1 to CON1-2 on 6300XA1 (ENCINT2) card in machine junction box is 24vdc. — Verify P5 to G5 output of 6300XA1 (ENCINT2) card in machine junction box is 5vdc at CON2-11 to CN2-10. — Verify F1 fuse good in case no P5 voltage. • Encoder wiring issue; Check the encoder wiring and connections between FWIA and machine and verify with system wiring diagrams. • Loose/open encoder factory connection. — Verify encoder harness and connectors between FWIA and DCA CON4. — Replace encoder harness if necessary. • Defective DCA; replace the card. • Encoder failure; replace the machine encoder. (Green Drive Manual, p78)", "title": "ENDAT_RESP_FLT — Absolute Encoder; Com Fault. • Case 1: Three successive absolute position readings from encoder did not match. • Case 2: Encoder communication failure. Note: BiSS and EnDat protocol are supported."}, "682": {"detail": "[Inverter/NON-RESETTABLE] Trigger: Run bit equal zero and elevator stopped Causes: • Verify power to encoder. • Verify P24F to G24 at FWIA CON5-10 and CON5-11 voltage output is 24vdc. • Verify F3 fuse on FWIA card is good in case no P24F voltage. • Verify P24 to G24 input at CON1-1 to CON1-2 on 6300XA1 (ENCINT2) card in machine junction box is 24vdc. • Verify P5 to G5 output of 6300XA1 (ENCINT2) card in machine junction box is 5vdc at CON2-11 to CN2-10. • Verify F1 fuse good in case no P5 voltage. • Encoder failure; replace the machine encoder. (Green Drive Manual, p79)", "title": "ENDAT_ALARM_FLT — Absolute Encoder; Internal Fault. Encoder internal fault or error including: • Light source fault • Signal amplitude error • Position value error • Overvoltage • Undervoltage • Overcurrent"}, "688": {"detail": "[Inverter/RESETTABLE] Trigger: Immediately following an elevator run. Causes: • Encoder wiring issue; check the encoder wiring and connections between FWIA and machine and verify with the system wiring diagrams. • Loose/open encoder manufacturing connection. — Verify encoder harness and connectors between FWIA and DCA CON4. — Replace encoder harness if necessary. • Defective DCA Card; replace the DCA Card. • Encoder failure; replace the machine encoder. (Green Drive Manual, p79)", "title": "ABS_INC_TRK_FLT — Absolute Encoder; Incremental Absolute Tracking Fault. Compares the following: a. The absolute position reported after a run, against b. The incremental position change during the run, added to the absolute position prior to the run. If a-b > 10 counts, a fault is issued."}, "689": {"detail": "[Inverter/RESETTABLE] Trigger: Active when run commanded. Causes: • Verify shield of encoder cable is correctly connected per the wiring diagrams. • If error occurring at start and/or stop when main brake not picked, verify Kp_Slip Gain not set too high using DAQ Trace 5 (wrref and realff) signals. • Loose/open encoder factory connection. — Verify encoder harness and connectors between FWIA and DCA CON4. — Replace encoder harness if necessary. • Encoder failure; replace the machine encoder. (Green Drive Manual, p79)", "title": "INC_DELTA_FLT — Encoder; Excessive speed change rate. Case 1: • RPM change > 10% of synchronous speed in 1 msec. Case 2: • RPM change > 22 RPM in 10 msec; occurring more than 4 times in a run."}, "690": {"detail": "[Inverter/RESETTABLE] Trigger: Elevator running with dictated speed - > 0.4 RPM (gearless) > 4.0 RPM (geared) Causes: • Verify shield of encoder cable is connected correctly as per wiring diagrams. • Encoder wiring issue; check the encoder wiring and connections between FWIA and machine and verify with system wiring diagrams. • Loose/open encoder mfg. connection. — Verify encoder harness and connectors between FWIA and DCA CON4. — Replace encoder harness if necessary. • Check the machine brake. • Encoder failure; replace the machine encoder. (Green Drive Manual, p79)", "title": "FBK_LOSS_FLT — Encoder; no incremental pulses received. Dictated speed > 0. Encoder pulses not detected for duration of 0.5 seconds."}, "691": {"detail": "[Inverter/RESETTABLE] Trigger: Initialization complete Run Bit = 1 Causes: • Velocity encoder improperly installed or coupled to motor shaft. • Improperly counterweighted car. • M39 or M40 adj. set too high for application. • If error occurs at start and/or stop when main brake not picked, use DAQ Trace 5 (wrref and realff) signals to verify Kp_Slip Gain not set too high. • Defective velocity encoder. • The encoder is not properly fixed or aligned at the machine shaft. • The encoder is not working properly; replace encoder. • Contract speed in IMS is different from setup on drive. • If pre-opening is enabled in the controller, verify that the car doors are not opening when the speed is greater than the value of the MAX SP OPEN DOOR parameter. (Green Drive Manual, p80)", "title": "OVERSPD_FLT — Overspeed Fault. Measured overspeed is detected as follows: • Inspection 115% of inspection speed limit adj. value. • Automatic w/doors closed 110% of automatic speed limit adj. value. • Automatic w/open door 115% of auto w/open door speed limit adj. value. • Automatic (During Acceptan"}, "693": {"detail": "[Inverter/NON-RESETTABLE] Trigger: Elevator is running. Causes: • Velocity encoder improperly installed or coupled to motor shaft. • If error occurring at start, verify control system adjustment M43 is not too long. — On MRL machines with small sheaves M43 may need to be reduced to 0.200 seconds. • M39 or M40 adj. set too high for application. • Improperly counterweighted car. • Machine brake pad seized. • Encoder failure; replace the machine encoder. (Green Drive Manual, p80)", "title": "VERR_FLT — Velocity Error Fault. System on Automatic Operation. • Difference in dictated & measured speed > 11 RPM. • Occurs at least 5 times in a given run."}, "694": {"detail": "[Inverter/RESETTABLE] Trigger: Run bit is active. Elevator running with dictated speed > zero. Causes: • Velocity encoder improperly installed or coupled to motor shaft. • Improperly counterweighted car. • Machine brake pad seized. • Incremental encoder used with Type 2 or Type 8 Inverter is not correct protocol; requires RS422 protocol with 5 VDC differential output from encoder. • Verify RSF (Slip Frequency) is set correctly for application for Type 2 and Type 8 Inverters. • Encoder failure; replace the machine encoder. (Green Drive Manual, p80)", "title": "UNDERSPD_FLT — Underspeed Fault. Difference in dictated & measured speed is detected as follows: • Inspection Operation, the larger of: 30% of adjusted inspection speed or 60 FPM. • Automatic Operation = 15% of adjusted automatic speed."}, "695": {"detail": "[Inverter/NON-RESETTABLE] Trigger: At beginning of a run, during rollback procedure. Causes: • Encoder misaligned (PMAC only). • Verify correct phasing at the U, V, and W output terminals of the drive. • If no ropes are installed on the machine, verify K_ARB and Timer_ARB are both equal to 0. • If ropes are installed on machine, verify K_ARB and Timer_ARB adjustments are correct (see Adjusting the Start section). • The encoder is out of alignment; realign the encoder (PMSM only). • Check the machine brake. • Verify the machine and PID parameters. (Green Drive Manual, p80)", "title": "ENCOD_MISALIGN — Absolute Encoder, Misalignment Fault. During rollback procedure, inverter current amplitude >= (Inom x 1.14 x 1.8)."}, "696": {"detail": "[Inverter/NON-RESETTABLE] Trigger: Elevator is running Causes: • Encoder wiring issue; Check the encoder wiring and connections between FWIA and machine and verify with the system wiring diagrams. • Loose/open encoder factory connection. — Verify encoder harness and connectors between FWIA and DCA CON4. — Replace encoder harness if necessary. • Incremental encoder used with Type 2 or Type 8 Inverter not the correct protocol; requires RS422 protocol with 5 VDC differential output from encoder. • Encoder failure; replace the machine encoder. • Defective DCA card; replace the card. (Green Drive Manual, p81)", "title": "ENC_PHASE_LOSS — Encoder, Loss of Phase Fault. Incremental encoder indicates more than 200 changes in direction of rotation during a run."}, "701": {"detail": "[Inverter/RESETS UPON] Trigger: Continuously. Causes: • Loose/bad connection of drive CAN wiring between the controller and the DCA Card. • Old version of NP firmware; verify NP firmware is installed. • Verify that the drive interface is set for the Green Drive (M82=5). (Green Drive Manual, p81)", "title": "COMM_FAULT — (COM_FLT_INV_CTRL) Com Fault; Inverter/Controller. • No CAN frames received by the inverter from the controller for 300 msec. • Message rate is every 10 msec (communication between NP and IP)."}, "705": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: At end of run. Causes: • Verify leads between SSOA card are connected correctly to BCA card terminals: — SSOA+: CON2-1 on SSOA to CON4-1 on BCA card. — SSOA-: CON2-2 on SSOA to CON4-2 on BCA card. • Defective SSOA card. Note: Before changing card, see BCA card troubleshooting procedures. (Green Drive Manual, p81)", "title": "DROP_FAIL_ERR_MB_SSOA — MBrake IGBT on SSOA Shorted. End-of-run normal brake test. • Normal brake current = zero is expected. • Normal brake current > zero is measured. • Test duration = 100 msec."}, "711": {"detail": "[Inverter/RESETTABLE] Trigger: Continuously after initialization. Notes: 1. The actual fault set/reset mechanism for the six IGBTs and the heatsink is the DTOK variable, and both the set and reset mechanisms are temperature driven. 2. Once everything cools down, the effect will be that of the Resettable-Unlimited. 3. If fan(s) have failed check for 745 fan failure warnings. Causes: • Fan failed; check for 745 (fan failure warnings). • Airflow blocked; check controller air intake filter/plenum; replace filter if needed. • High ambient temperature. • Excessive duty cycle. • Long inspection run. • Replace the PEA assembly if necessary. (Green Drive Manual, p81)", "title": "OVER_TEMP — Over Temperature, Non-Emergency. • 5 consecutive readings during an automatic run which indicate: — PEA heatsink thermistor > 85° C, or — Any IGBT thermistor > 115° C. • Fault to clear when both above temps are reduced to < 60° C. • PEA/PEB Heatsink and Ambient Air fans run continuously "}, "712": {"detail": "[Inverter/NON-RESETTABLE] Trigger: During system initialization Causes: • Improperly rated drive for the job. • Incorrectly entered parameters, particularly Drive In Rated Voltage. • The PEA assembly is not compatible with the configured software; review drive parameters. (Green Drive Manual, p82)", "title": "HW_CONF_FLT — Hardware Configuration Fault; Inverter. PEA transmitted ID does not match inverter configured nominal current or voltage."}, "713": {"detail": "[Inverter/RESETS UPON] Trigger: Continuously when elevator is running. Causes: Emergency stop initiated by the controller (which removed SP normal brake enable CAN bit) can cause this. — Investigate causes of the emergency stop. (Green Drive Manual, p82)", "title": "DRV_ENBL_LOSS — Drive Enable Loss. Dictated speed > zero. DRV_ENBL bit is set to off state."}, "714": {"detail": "[Rectifier/RESETS UPON] Trigger: Continuously. Causes: • Low line voltage or high line voltage; check the voltage at terminals L1, L2, and L3. — Use a meter to measure the input voltage, line to line and line to ground. • Verify the fusing or circuit breaker. • Drive output power requirement is exceeding available input power to the drive (causing input supply to sag) • Input phase loss. • Loose/open input wiring and/or wiring between drive and input choke; check L1, L2, L3, A1, B1, C1, A2, B2, C2, and GND. • Input supply phase imbalance; verify phase imbalance does not exceed 4%. • DCA Card fuse F2 is open. (Green Drive Manual, p82)", "title": "3_PHASE_IN_TOL — Three-Phase Intolerance. 3 Phase Supply Voltage Out of Tolerance. • System idle: L1, L2, or L3 instantaneous Lineto-GND voltage exceeds +/- 15% of nominal value. • System running: L1, L2, or L3 instantaneous Line-to-GND voltage exceeds +/- 20% of the nominal value."}, "715": {"detail": "[Rectifier/RESETTABLE] Trigger: Continuously when elevator is running. Causes: Verify that the normal brake pick and hold current adjustments (B34, B35, B36, B37) are correct and do not exceed the rating of the BCA Card. BCA Rating: BCA - 5.8 Amps Pick; 3 Amps Hold. (Green Drive Manual, p82)", "title": "OC_MB — Timed Over Current, Machine Brake, BCA. Normal brake timed overcurrent exceeded the rating of the BCA card, see chart below. BCA Timed Overcurrent 30 25 20 sdnoceS 15 10 5 0 0 0.5 1 1.5 2 2.5 3 3.5 4 4.5 5 5.5 6 6.5 Amps Notes: 1. Fault code is sent to controller. 2. Controller to perform a "}, "716": {"detail": "[Rectifier/RESETTABLE] Trigger: Continuously when elevator is running. Causes: Verify that the emergency brake pick and hold current adjustments (B39, B40) are correct and do not exceed the rating of the BCA Card. BCA Rating: BCA - 5.8 Amps Pick; 3 Amps Hold. (Green Drive Manual, p83)", "title": "OC_EB — Timed Over Current, Emergency Brake, BCA. Emergency brake timed overcurrent exceeded the rating of the BCA card, see chart below. BCA Timed Overcurrent 30 25 20 sdnoceS 15 10 5 0 0 0.5 1 1.5 2 2.5 3 3.5 4 4.5 5 5.5 6 6.5 Amps Notes: 1. Fault code is sent to controller. 2. Controller to perfo"}, "717": {"detail": "[Inverter/RESETTABLE] Trigger: Continuously when elevator is running. Causes: This is typically a secondary fault. See other rectifier or brake related faults for possible causes/solution. (Green Drive Manual, p83)", "title": "RECT_RUN_LOSS — Drive Rectifier Interrupted Motion. Rectifier removes its run bit to the inverter during motion. Note: Inverter holds motor torque while waiting on the brake to drop."}, "723": {"detail": "[PEA/NON-RESETTABLE] Trigger: Detection when IGBT ON gate command is present. Causes: • Airflow blocked causing temperature rise at IGBT gate driver card internally; verify controller air intake filter/plenum not restricting airflow. • Mechanical component binding. • Internal drive failure. • Short circuit between DC bus rail (B+ or B-) and input choke connections (A2, B2, C2). • The PEA phase T IGBT is in short circuit; replace the PEA assembly. (Green Drive Manual, p83)", "title": "OOST_FLT — Short Circuit, Phase T, PEA. High current level (out-of-saturation) detected in T phase IGBT."}, "724": {"detail": "[PEA/NON-RESETTABLE] Trigger: Detection when IGBT ON gate command is present. Causes: • Airflow blocked causing temperature rise at IGBT gate driver card internally; verify controller air intake filter/plenum not restricting airflow. • Mechanical component binding. • Internal drive failure. • Short circuit between DC bus rail (B+ or B-) and input choke connections (A2, B2, C2). • The PEA phase S IGBT is in short circuit; replace the PEA assembly. (Green Drive Manual, p83)", "title": "OOSS_FLT — Short Circuit, Phase S, PEA. High current level (out-of-saturation) detected in S phase IGBT."}, "725": {"detail": "[PEA/NON-RESETTABLE] Trigger: Detection when IGBT ON gate command present. Causes: • Airflow blocked causing temperature rise at IGBT gate driver card internally; verify controller air intake filter/plenum not restricting airflow. • Mechanical component binding. • Internal drive failure. • Short circuit between DC bus rail (B+ or B-) and input choke connections (A2, B2, C2). • The PEA phase R IGBT is in short circuit; replace the PEA assembly. (Green Drive Manual, p84)", "title": "OOSR_FLT — Short Circuit, Phase R, PEA. High current level (out-of-saturation) detected in R phase IGBT."}, "726": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: With active Run command. Causes: • Causes of excess motor torque fault 663 can work back to the line to cause the 726 fault. • Check for loose output wiring (U,V, W). • Mis-wired between drive and input choke; check A1, B1, C1, A2, B2, and C2 wiring. • Kp_Curr_R value is too low. • Building supply cannot absorb regenerated load (possible during emergency power or building construction) due to insufficient connective load. (Green Drive Manual, p84)", "title": "XS_CURR_LIM_R — Current Command Limit; Rectifier. Current Command Automatic: • Amplitude >= (Inom_motor x 1.414 x OLF) Note: OLF (overload factor) varies depending on drive size. • 200/400: OLF = 2.15 Inspection: • Amplitude >= (Inom_motor x 1.448 x 1.84) • Duration >= 0.5 second"}, "729": {"detail": "[Inverter/NOTIFY] Trigger: Continuously. Causes: DCA inverter software was updated. (Green Drive Manual, p84)", "title": "WATCH_DOG_FAULT — Watch Dog Fault; Inverter. DCA Inverter watchdog timer expires."}, "730": {"detail": "[Rectifier/NOTIFY] Trigger: Continuously. Causes: DCA rectifier software was updated. (Green Drive Manual, p84)", "title": "WATCH_DOG_FAULT_R — Watch Dog Fault; Rectifier. DCA Rectifier watchdog timer expires."}, "745": {"detail": "[PEA/NOTIFY] Trigger: Continuously when elevator is running. Causes: • Fan obstruction. • Fan failed. • Airflow blocked; check controller air intake filter/plenum; replace filter if needed. • Replace the PEA assembly if necessary. (Green Drive Manual, p84)", "title": "FAN_FLT — Fan Failure; PEA."}, "750": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 644. (Green Drive Manual, p84)", "title": "OCT_FLT — Over Current, Phase T, PEA. Instantaneous phase T current > (see value below) • 400E and 400F: 262A (=Inom_rec x 1.414 x 2.26) • 400C: 131A (=Inom_rec x 1.414 x 2.26) • 200D: 262A (=Inom_rec x 1.414 x 2.53) • 200C: 131A (=Inom_rec x 1.414 x 2.54)"}, "751": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 644. (Green Drive Manual, p85)", "title": "OCS_FLT — Over Current, Phase S, PEA. Instantaneous phase S current > (see value below) • 400E and 400F: 262A (=Inom_rec x 1.414 x 2.26) • 400C: 131A (=Inom_rec x 1.414 x 2.26) • 200D: 262A (=Inom_rec x 1.414 x 2.53) • 200C: 131A (=Inom_rec x 1.414 x 2.54)"}, "752": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 644. (Green Drive Manual, p85)", "title": "OCR_FLT — Over Current, Phase R, PEA. Instantaneous phase R current > (see value below) • 400E and 400F: 262A (=Inom_rec x 1.414 x 2.26) • 400C: 131A (=Inom_rec x 1.414 x 2.26) • 200D: 262A (=Inom_rec x 1.414 x 2.53) • 200C: 131A (=Inom_rec x 1.414 x 2.54)"}, "753": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuous after Bus Charge complete. Causes: See Fault 629. (Green Drive Manual, p85)", "title": "OVDC_FLT — Over Voltage, DC Bus, PEA. DC Bus voltage exceeds: • Class 200: 425 Vdc. • Class 400: 850Vdc."}, "754": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: High line voltage; check the L1, L2, and L3 voltages. (Green Drive Manual, p85)", "title": "OVT_FLT — Over Voltage, Phase T, PEA. Phase T voltage exceeds: Class 200: 236Vinst, L-N (equiv 290Vrms, L-L). Class 400: 474Vinst, L-N (equiv 580Vrms, L-L)."}, "755": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: High line voltage; check the L1, L2, and L3 voltages. (Green Drive Manual, p85)", "title": "OVS_FLT — Over Voltage, Phase S, PEA. Phase S voltage exceeds: Class 200: 236Vinst, L-N (equiv 290Vrms, L-L). Class 400: 474Vinst, L-N (equiv 580Vrms, L-L)."}, "756": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: High line voltage; check the L1, L2, and L3 voltages. (Green Drive Manual, p85)", "title": "OVR_FLT — Over Voltage, Phase R, PEA. Phase R voltage exceeds: Class 200: 236Vinst, L-N (equiv 290Vrms, L-L). Class 400: 474Vinst, L-N (equiv 580Vrms, L-L)."}, "757": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuous. Causes: • Brief power interruption may result in nuisance trip. • Drive internal power supply failure; replace PEA assembly if necessary. • Update inverter and rectifier to V2R5 or later software. (Green Drive Manual, p86)", "title": "PSUV_FLT — Under Voltage, DC Power Supply, PEA. PEA detects at least one of the listed DC power supply voltages to be out of range. • +24: < 22.52 V • +15: < 14.22 V • -15: > -14.17 V • +5: < 4.77 V • +3.3: < 3.09 V"}, "758": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 627. (Green Drive Manual, p86)", "title": "OCW_FLT — Over Current, Phase W, PEA. Instantaneous phase W current > (see value below): • 400E and 400F: 255A (=Inom_rec x 1.414 x 2.26) • 400C: 128A (=Inom_rec x 1.414 x 2.26) • 200D: 255A (=Inom_rec x 1.414 x 2.26) • 200C: 128A (=Inom_rec x 1.414 x 2.26)"}, "759": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 627. (Green Drive Manual, p86)", "title": "OCV_FLT — Over Current, Phase V, PEA. Instantaneous phase V current > (see value below): • 400E and 400F: 255A (=Inom_rec x 1.414 x 2.26) • 400C: 128A (=Inom_rec x 1.414 x 2.26) • 200D: 255A (=Inom_rec x 1.414 x 2.26) • 200C: 128A (=Inom_rec x 1.414 x 2.26)"}, "760": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 627. (Green Drive Manual, p86)", "title": "OCU_FLT — Over Current, Phase U, PEA. Instantaneous phase U current > (see value below): • 400E and 400F: 255A (=Inom_rec x 1.414 x 2.26) • 400C: 128A (=Inom_rec x 1.414 x 2.26) • 200D: 255A (=Inom_rec x 1.414 x 2.26) • 200C: 128A (=Inom_rec x 1.414 x 2.26)"}, "761": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: • Use an insulation tester to check motor wiring, output choke, and motor winding to ground resistance. • Brief power interruption may cause a nuisance trip. (Green Drive Manual, p86)", "title": "GND_FLT — Ground Fault, Inverter, PEA. The instantaneous sum of the three phase output currents is greater than 20% of the rated phase current. √ (Iu + Iv + Iw) > 20% x 2 x Inom."}, "762": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously. Causes: Brief power interruption may cause a nuisance trip. (Green Drive Manual, p87)", "title": "SCR_FLT — SCR Fault, PEA. SCR gate driver board reports fault."}, "763": {"detail": "[Inverter/RESETS UPON] Trigger: Continuously. Causes: • Update inverter and rectifier software to V2R5 or later. • Update PEA INTF software to V1R38 or later. • Invalid drive software; verify correct versions of DCA (IP and RP) and PEA (INTF and SCR) software are loaded. • Connection between the DCA and PEA/PEB Cards. • Shorted Inverter CAN BUS (Drive internal CAN BUS) with drive powered OFF. — Measure resistance between ICH and ICL on DCA Card (CON6, pins 23 and 24). — If resistance measures '0' ohms, remove card and measure again at DCA card; if still '0' ohms, replace card. • With DCA Card removed, measure at the pins connected to PEA Interface card; if resistance still measures '0' ohms, replace PEA assembly. (Green Drive Manual, p87)", "title": "COMFAIL_FLT — (COM_FLT_INV_PEA) Com Fault; Inverter / PEA. CAN communication fault between IP and PEA/ PEB. Fault is triggered by either of the following conditions: • IP does not receive a specific CAN message from PEA for 1 second (normal message rate is every 100 msec) • PEA does not receive a sp"}, "764": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: • For over temperature, see Fault 711. • Verify ambient temperature is in the proper range for the product. (Green Drive Manual, p87)", "title": "OTH_FLT — Over/Under Temperature, Heatsink, PEA. PEA heatsink thermistor indicates > 100°C or < – 10°C."}, "765": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 711. (Green Drive Manual, p87)", "title": "OTA_FLT — Over Temperature, Ambient, PEA. PEA Interface board ambient temp sensor indicates > 85°C."}, "766": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 711. (Green Drive Manual, p87)", "title": "OTI_FLT — Over Temperature, Inverter, PEA. IGBT module NTC indicates at least one IGBT junction temperature >= 125°C. Applies to phase U, V, W and inverter 6-pack IGBTs."}, "767": {"detail": "[PEA/NON-RESETTABLE] Trigger: Continuously after initialization. Causes: See Fault 711. (Green Drive Manual, p87)", "title": "OTC_FLT — Over Temperature, Rectifier, PEA. IGBT module NTC indicates at least one IGBT junction temperature >= 125°C. Applies to phase R, S, T and converter 6-pack IGBTs."}, "768": {"detail": "[PEA/NOTIFY] Trigger: Continuously after initialization. Causes: • Check the input fusing or circuit breaker. • Input phase loss. • Loose/open input wiring and/or wiring between drive and input choke; check L1, L2, L3, A1, B1, C1, A2, B2, C2, and GND. (Green Drive Manual, p87)", "title": "PH_LC_FLT — Phase Lock Fault, PEA. PEA SCRs are in full conduction and two AC phases drop out."}, "769": {"detail": "[PEA/NOTIFY] Trigger: Continuously after initialization. Causes: • Check the input fusing or circuit breaker. • Input phase loss. • Loose/open input wiring and/or wiring between drive and input choke; check L1, L2, L3, A1, B1, C1, A2, B2, C2, and GND. (Green Drive Manual, p88)", "title": "PH_SW_RUN_FLT — Phase Switch While Running Fault, PEA. A change in number of incoming AC line phases present was detected while the SCRs were gating. • The number of phases that are detected now differs from the number of phases detected when the unit started running. • Phase stability timer has rea"}, "771": {"detail": "[PEA/NOTIFY] Trigger: Continuously after initialization. Causes: • Loose/open input wiring and/or wiring between drive and input choke; check L1, L2, L3, A1, B1, C1, A2, B2, C2, and GND. • A Ground Fault (761) has occurred and preventing DC BUS from charging and causing error. (Green Drive Manual, p88)", "title": "BUS_CH_FLT — Bus Charge Fault, PEA. DC Bus failed to charge to minimum level in one second. • Three Phase Operation voltage level is: — Class 400: 225V. — Class 200: 120V. • Single Phase Operation voltage level is 120V."}, "785": {"detail": "[Rectifier/NOTIFY] Trigger: Continuously after initialization Causes: Fast DC Bus Discharge operation was requested. (Green Drive Manual, p88)", "title": "BDIS_FLT — Bus Fast Discharge Shutdown. Fast Bus Discharge operation has been requested. Note: Re-activation of DC BUS requires threephase or single-phase power cycle or reset of both DCA processors."}, "812": {"detail": "[Inverter/NOTIFY] Trigger: Continuously when elevator is running. Causes: • Brake not picking properly. • Mechanical component binding. • Incorrect counterweighting. • Excessive load placed on the elevator. • Verify correct phasing at the U, V, and W output terminals of the drive. • Inverter current regulator gain KP_VS not adjusted properly, use DAQ Trace 9 to verify gain set correctly. — If adjustment of KP_VS Gain does not eliminate fault, verify that the motor wiring is correct for the voltage rating of motor versus drive (e.g., 460-volt motor with 480volt drive; 208/230-volt motor with 230volt drive). — Operating on regen disable (in this mode, the drive does not boost DC bus); Adjust KP_VS Gain. • Acceleration/deceleration rates (M39 and M40 adjustments) set too high. • Check for loose output wiring (U,V, W). • Incremental (VEA+/VEA-, VEB+/VEB-) encoder signals reversed. • Incorrect parameters. (Green Drive Manual, p88)", "title": "PLIMIT_FLT — Torque Current Command Limit Warning; Inverter; Positive. Torque Current command has momentarily attained the positive amplitude limit defined as the following: Automatic: • Amplitude >= (Inom_motor x 1.414 x OLF) Note: OLF (overload factor) varies depending on drive size indicated belo"}, "813": {"detail": "[Inverter/NOTIFY] Trigger: Continuously when elevator is running. Causes: • Brake not picking properly. • Mechanical component binding. • Incorrect counterweighting. • Excessive load placed on the elevator. • Verify correct phasing at the U, V, and W output terminals of the drive. • Inverter current regulator gain KP_VS not adjusted properly, use DAQ trace 9 to verify gain is set correctly. — If adjustment of KP_VS Gain does not eliminate fault, verify that the motor wiring is correct for the voltage rating of motor versus drive (e.g., 460-volt motor with 480-volt drive; 208/230-volt motor with 230-volt drive). — Operating on regen disable (in this mode, the drive does not boost DC bus); Adjust KP_VS Gain. • Acceleration/deceleration rates (M39 and M40 adjustments) set too high. • Check for loose output wiring (U,V, W). • Incremental (VEA+/VEA-, VEB+/VEB-) encoder signals reversed. • Incorrect parameters. (Green Drive Manual, p89)", "title": "NLIMIT_FLT — Torque Current Command Limit Warning; Inverter; Negative. Torque Current Command has momentarily attained the negative amplitude limit as defined following: Automatic: • Amplitude >= (Inom_motor x 1.414 x OLF) Note: OLF (overload factor) varies depending on drive size indicated below. •"}, "814": {"detail": "[Rectifier/NOTIFY] Trigger: Continuously when elevator is running. Causes: • Causes of excess motor torque warnings/faults (812, 813, 663) can work their way back to the line to cause the 814 warning. • Check for loose output wiring (U,V, W). • Mis-wire between drive and input choke; check A1, B1, C1, A2, B2, and C2 wiring. • Kp_Curr_R is too low. • Building supply cannot absorb regenerated load (possible during emergency power or building construction). (Green Drive Manual, p89)", "title": "POS_LIM_R — Direct Current Command Limit Warning; Rectifier; Positive. Rectifier Direct Current Command momentarily attained the positive amplitude limit as defined by the following: Automatic: • Amplitude >= (Inom_motor x 1.414 x OLF) Note: OLF (overload factor) varies depending on drive size indic"}, "815": {"detail": "[Rectifier/NOTIFY] Trigger: Continuously when elevator is running. Causes: • Causes of excess motor torque warnings/faults (812, 813, 663) can work their way back to the line to cause the 815 warning. • Check for loose output wiring (U,V, W). • Mis-wire between drive and input choke; check A1, B1, C1, A2, B2, and C2 wiring. • Kp_Curr_R is too low. • Building supply cannot absorb the regenerated load (possible during emergency power or building construction). (Green Drive Manual, p89)", "title": "NEG_LIM_R — Direct Current Command Limit Warning; Rectifier; Negative. Rectifier Direct Current Command momentarily attained the positive amplitude limit as defined by the following: Automatic: • Amplitude >= (Inom_motor x 1.414 x OLF) Note: OLF (overload factor) varies depending on drive size indic"}, "820": {"detail": "[Inverter / Rectifier/NON-RESETTABLE] Trigger: Continuously when elevator is running. Causes: • Multiple consecutive interrupted runs (either due to an emergency stop from other faults, or when switching from automatic and inspection operations) may cause fault; investigate the cause of interrupted runs. • If the machine has been provided with a sheave brake, use the IMS Smart FAST to verify that the following are set correctly: — B46 Brake Adjustment = 2 — B49 Brake Adjustment = 1800 — EBC2 and EBM2 I/O not present in I/O Map. • Verify the elevator is not re-leveling at a floor without making a normal run more than 5 times. • Verify the harness connections between the DCA and IOE(2) Cards. (Green Drive Manual, p90)", "title": "NO_SAFE_TESTS — End-of-Run or Start-of-Run tests not performed. This fault is declared if drive detects the following: • Safe Torque Off start-of-run and end-of-run tests were not performed for 5 consecutive runs. • Normal brake control start-of-run test was not performed for 5 consecutive runs. • N"}, "821": {"detail": "[Rectifier/RESETTABLE] Trigger: • Normal brake current dictation zero. • Speed dictation zero. • BRKC = false. Continuously when elevator is running. Causes: • Loose BRKC wiring between controller and DCA Card. • Emergency stop initiated by the controller (which removed BRKC) can cause this. Investigate causes of the emergency stop. (Green Drive Manual, p90)", "title": "BRKC_LOSS — BRKC loss during run."}, "822": {"detail": "[Rectifier/RESETTABLE] Trigger: • Emergency brake current dictation zero. • Speed dictation zero. • EBC1 = false. Continuously when elevator is running. Causes: • Loose EBC1 wiring between controller and DCA Card CON1. • Emergency stop initiated by the controller (which removed EBC1) can cause this. Investigate causes of the emergency stop. (Green Drive Manual, p90)", "title": "EBC1_LOSS — EBC1 loss during run."}, "823": {"detail": "[Rectifier/RESETTABLE] Trigger: • Normal brake current dictation zero. • Speed dictation zero. • SP normal brake enable bit = false. Continuously when elevator is running. Causes: • Loose Drive CAN wiring between controller and DCA Card CON1. • Emergency stop initiated by the controller (which removed SP normal brake enable CAN bit) can cause this. Investigate causes of the emergency stop. (Green Drive Manual, p90)", "title": "M_SP_LOSS — Normal Brake Enable loss during run. Elevator system on automatic operation (during demand velocity)."}, "824": {"detail": "[Rectifier/RESETTABLE] Trigger: • Emergency brake current dictation zero. • Speed dictation zero. • SP normal brake enable bit = false. Continuously when elevator is running. Causes: • Loose Drive CAN wiring between controller and DCA Card CON1. • Emergency stop initiated by the controller (which removed SP emergency brake enable CAN bit) can cause this. Investigate causes of the emergency stop. (Green Drive Manual, p90)", "title": "E_SP_LOSS — Emergency Brake Enable loss during run. Elevator system on automatic operation (during demand velocity)."}, "825": {"detail": "[Rectifier/NOTIFY] Trigger: • Normal brake current dictation zero. • Speed dictation zero. • BRKDRV (from inverter to rectifier) = false. Continuously when elevator is running. Causes: • DCA inverter processor detected fault (e.g. 674, 694) and initiated emergency stop; investigate causes of other faults. • Check for loose output wiring (U, V, and W). (Green Drive Manual, p90)", "title": "BRKDRV_LOSS — BRKDRV loss during run."}, "826": {"detail": "[Inverter/RESETTABLE] Trigger: Continuously when elevator is running. Causes: • Update the IP and RP software on the DCA Card to V2R5 or later. • Update the PEA Interface software to V1R38 or later. (Green Drive Manual, p91)", "title": "BRKDRV_BAD — BRKDRV state mismatch inverter-to-rectifier. BRKDRV state mismatch IP to RP in comparison to discrete signal. • IP sends BRKDRV signal to RP over CAN. • RP echoes BRKDRV state to RP. • Fault is declared if a disagreement for 1 sec."}, "827": {"detail": "[Inverter/NON-RESETTABLE] Trigger: During system initialization. Causes: Incorrect software was loaded; load correct software. (Green Drive Manual, p91)", "title": "INRT_PROC_FLT — Software Install Fault; Inverter. Rectifier software detects that it has been installed in the inverter processor."}, "828": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: During system initialization. Causes: Incorrect software was loaded; load correct software. (Green Drive Manual, p91)", "title": "RECT_PROC_FLT — Software Install Fault; Rectifier. Inverter software detects that it has been installed in rectifier processor."}, "830": {"detail": "[Rectifier/NON-RESETTABLE] Trigger: During system initialization. Causes: • Improperly rated drive for job. • Incorrectly entered parameters, particularly Drive In Rated Voltage. • The PEA/PEB assembly is not compatible with the configured software; review parameters. (Green Drive Manual, p91)", "title": "HW_R_CONF_FLT — Hardware Configuration Fault; Rectifier. PEA transmitted ID does not match rectifier configured nominal current or voltage."}, "831": {"detail": "[Inverter/NON-RESETTABLE] Trigger: During system initialization. Causes: Drive software upload was initiated. (Green Drive Manual, p91)", "title": "SW_UPLOAD — Software Upload Mode; Rectifier, Inverter, PEA. • Inverter Processor enters download mode. • Rectifier Processor enters download mode. • PEA Interface Processor enters download mode."}, "832": {"detail": "[Inverter/RESETTABLE] Trigger: • Torque Current 0. • Encoder Alignment active for >= 8 sec. Note: After fault, 60 second delay imposed prior to reset. Encoder alignment flag active. Causes: Inspection active too long, reduce the time the inspection is active during the Encoder Alignment. (Green Drive Manual, p91)", "title": "XS_ENC_ALIGN — Encoder Alignment Time Limit."}, "833": {"detail": "[Inverter/NOTIFY] Trigger: During software upload. (Green Drive Manual, p91)", "title": "SW_BAD_UPLOAD — Software Upload Failure; INTF/SCR • Upload failure of 1 packet of PEA INTF or SCR software. • Failed packet is resent."}, "834": {"detail": "[Inverter/NOTIFY] Trigger: Continuously after initialization. Causes: • Motor operating temperature exceeded. • Motor thermistor wiring loose; verify the connections. • Failed motor thermistor. (Green Drive Manual, p92)", "title": "OTM_FLT — Over Temperature, Motor The fault will register when MTEMP=1, the motor temperature is >=110°C; the fault clears when the temperature is reduced to <=107°C. Notes: • The actual fault set/reset mechanism for the motor temperature is the MTOK variable, and both the set and reset are temperat"}, "981": {"detail": "[Control System] Causes: • Slowdown magnet placement, P17/P18 adjustment, or valve adjustment. (TAC32 Manual p202)", "title": "Terminal slowdown was activated before normal slowdown; This fault does not shut the car down."}, "1002": {"detail": "[Control System] Causes: • Noise levels that affect CPU operation. • Defective CPU software allocates too much memory (only when installing new software version). (TAC32 Manual p202)", "title": "OS could not allocate memory - This fault is mainly used during software development, but proves useful to detect operational issues on installed units."}, "1003": {"detail": "[Control System] Causes: • Possible noise interference. • Possible defective CPU. • If using Ethernet communication: update to v6r6B or later generic software. (TAC32 Manual p202)", "title": "FSched Overrun - Car software failed to run in alloted time with a retry."}, "1004": {"detail": "[Control System] Causes: • Car doors clipping interlocks. • Defective I/O. • Defective gate contact. • Defective wiring. (TAC32 Manual p202)", "title": "Gate and locks opened during a run - A car or hoistway interlock opened while the car was running."}, "1005": {"detail": "[Control System] Causes: • A defective DOL input. • A defective HDIF input. (TAC32 Manual p202)", "title": "DOL was detected while HW closed."}, "1006": {"detail": "[Control System] Causes: • A defective I/O. • A defective hoistway door contact. • A blocked hoistway door. (TAC32 Manual p202)", "title": "The hoistway interlock failed to close."}, "1007": {"detail": "[Control System] Causes: • An open device in the safety string. • A defective I/O. (TAC32 Manual p202)", "title": "The safety string opened during a run and caused an emergency stop."}, "1008": {"detail": "[Control System] Causes: • A defective I/O. • Software activation error. MUTS signal wiring. • Defective relays. (TAC32 Manual p202)", "title": "The motor contactor is already energized (MCD/ MCE) - A run initiation was issued, but either MCD was already inactive, or MCE was already active."}, "1009": {"detail": "[Control System] Causes: • A defective MCD input. • A defective MCE input. MUTS signal wiring. • Defective relays. (TAC32 Manual p202)", "title": "• A valve contact error (MCD is open). • Either the valves or MC are not ready. • MCD is inactive, or MCE is active during a Down run."}, "1010": {"detail": "[Control System] Causes: • Defective MCD input. • Defective MCE input. • Defective MC contact. MUTS signal wiring. • Defective relays. (TAC32 Manual p202)", "title": "• Motor contactor error (MCD Open). • MCD failed to energize or MCE failed to de-energize after run."}, "1011": {"detail": "[Control System] Causes: Possible Causes: • A defective MCD/MCE input. • A defective MC1/MC2 auxiliary contact. • A defective MCF input. • MUTS input. • A UTS output from EMS. The EMS current parameter is not correct. (TAC32 Manual p202)", "title": "• Motor contactor failed to energize (MCD/MCE). • MCD is active, or MCE is inactive after a run. • Motor Contactor Fault (MCF) input is activated."}, "1012": {"detail": "[Control System] Causes: Reload generic and job image (job software). (TAC32 Manual p202)", "title": "Job image error - Invalid number of floors."}, "1013": {"detail": "[Control System] Causes: — (TAC32 Manual p203)", "title": "NV hardware failure - The software issued a command to modify non-volatile memory that was not completed, or completed with invalid results."}, "1014": {"detail": "[Control System] Causes: Possible Causes: • Memory error. • Bad/low CPU battery. Possible Solution:. Issue GET Command followed by WRT Command. (TAC32 Manual p203)", "title": "NV checksum error - The data in non-volatile memory was lost."}, "1015": {"detail": "[Control System] Causes: Reload generic and job image (job software). (TAC32 Manual p203)", "title": "Software error - The software is making an invalid NV request."}, "1016": {"detail": "[Control System] Causes: Reload generic and job image (job software). (TAC32 Manual p203)", "title": "Software error - The NV is full and cannot hold another client structure. There is no more room for data in non-volatile memory."}, "1017": {"detail": "[Control System] Causes: Determine what run type interrupted the Automatic run, use PCL command. (TAC32 Manual p203)", "title": "Software error - A change in run type occurred during a run. The car is not performing an emergency stop and the software has changed the type of run."}, "1018": {"detail": "[Control System] Causes: • Defective wiring. • A defective I/O. (TAC32 Manual p203)", "title": "Normal limit error - Both of the top and bottom normal limits (DL, NTST, NTSB) are active at the same time."}, "1019": {"detail": "[Control System] Causes: • Incorrect magnet positioning. • Car CAN loading or noise on the Car CAN channel. (TAC32 Manual p203)", "title": "• The normal limits and the car position do not agree. • The selector is not lost. • The car position is not at the top or bottom floor. • The I/O DL activated before car reached the floor."}, "1020": {"detail": "[Control System] Causes: — (TAC32 Manual p203)", "title": "The I/O database has been corrupted, or the checksum for I/O has changed."}, "1021": {"detail": "[Control System] Causes: • A wiring error. • Defective I/O: IN, INOP, INHA, INCN, INCT, INHAM. (TAC32 Manual p203)", "title": "• The status of an I/O indicates a combination of active and inactive inspection inputs that are not allowed."}, "1022": {"detail": "[Control System] Causes: Ran too long and did not get to the target floor. (TAC32 Manual p203)", "title": "Run monitor - The run protect timer has expired."}, "1023": {"detail": "[Control System] Causes: — (TAC32 Manual p203)", "title": "Run monitor - The wrong direction run. The software issued a command to run in one direction, but the car actually ran in the other direction."}, "1024": {"detail": "[Control System] Causes: • 19 through P24 set incorrectly. • Mis-adjusted valve. (TAC32 Manual p203)", "title": "Excessive number of re-levels - A fault is issued if the elevator re-levels more than 25 times within a 5-minute interval."}, "1025": {"detail": "[Control System] Causes: — (TAC32 Manual p203)", "title": "BP parity error."}, "1028": {"detail": "[Control System] Causes: • Defective Door Zone input(s) on selector unit. • Defective magnet. (TAC32 Manual p203)", "title": "The selector shows the level outside of the door zone - The inputs indicate that the car is level at the floor-at some location other than within the door zone."}, "1029": {"detail": "[Control System] Causes: Corrupted CAN message. Caused by incorrect CAN loading, CAN comm. cable routing, or noise in the control system. (TAC32 Manual p203)", "title": "LU and LD are active at same time - This fault indicates that both level up and level down inputs are active at the same time."}, "1030": {"detail": "[Control System] Causes: Selector installed upside down. (TAC32 Manual p203)", "title": "Leveling sequence error - The leveling inputs were activated in an invalid sequence."}, "1031": {"detail": "[Control System] Causes: • Incorrect number of leveling vanes was detected. • A bad floor position setup. • The selector setup is incomplete. • Scanning the hatch too fast, wrong job image loading to the CPU. (TAC32 Manual p204)", "title": "Selector setup error - The selector was not properly setup."}, "1032": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "False slowdown interrupt - The slowdown interrupt was detected with no active slowdown input."}, "1033": {"detail": "[Control System] Causes: Defective encoder on the selector, or slowdown magnets moved since last hoistway setup. (TAC32 Manual p204)", "title": "Selector position error - The selector position is out of step with either the encoder, the slowdown, or the BP position."}, "1034": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Expansion card error - The incorrect expansion card type was returned."}, "1040": {"detail": "[Control System] Causes: • An incorrect D21 and/or D22 adjustment; Check door operator fault list. (TAC32 Manual p204)", "title": "Door watchdog closing failure - The DCL input did not activate within the expected time interval."}, "1041": {"detail": "[Control System] Causes: • An incorrect D21 and/or D22 adjustment; Check door operator fault list. (TAC32 Manual p204)", "title": "Door watchdog opening failure - The DCL input did not activate within the expected time interval."}, "1042": {"detail": "[Control System] Viscosity Shutdown due to over temperature – OLTO input is (or was at some time) active. Note: This will activate even if viscosity controller is not provided on the job, with some older generic versions, install a jumper across IOD CON23, pin 1 to pin 3. Requires Inspection to reset. Causes: OLTO input sensor or wiring. (TAC32 Manual p204)", "title": "Viscosity Shutdown due to over temperature – OLTO input is (or was at some time) active. Note: This will activate even if viscosity controller is not provided on the job, with some older generic versions, install a jumper across IOD CON23, pin 1 to..."}, "1043": {"detail": "[Control System] Causes: • Bad Valve Control Solenoid. • Clogged filter in the valve. • Mis-adjusted valve. • MRLH ONLY - Bucher valve control card fault stopped the run, check valve fault list. (TAC32 Manual p204)", "title": "Car did not complete floor to floor run within low [oil] fluid timer (O17)"}, "1044": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Both inputs are in the required state to activate and deactivate Fire Service Phase 1 at the same time."}, "1045": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Both inputs are in the required state to activate and deactivate Fire Service Phase 2 at the same time."}, "1046": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Failed to add I/O to the hardware assignments list - An invalid I/O name was found."}, "1047": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Calls canceled due to service interruption."}, "1049": {"detail": "[Control System] Causes: Check door operator for faults. (TAC32 Manual p204)", "title": "Open door protection failure - The doors failed to open in the allotted time."}, "1050": {"detail": "[Control System] Causes: Check door operator for faults. (TAC32 Manual p204)", "title": "Close door protection failure - The doors failed to close in the allotted time."}, "1051": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Stuck door opening device error - The SE, EE, DOB, or DHB I/O is stuck in the active state."}, "1052": {"detail": "[Control System] Causes: — (TAC32 Manual p204)", "title": "Stuck DCB error
